<!DOCTYPE html>
<html lang="or">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Vidya Academy — Special Training</title>

    <!-- PWA -->
    <link rel="manifest" href="./manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="E-Vidya +2">
    <meta name="theme-color" content="#667eea">
    <link rel="apple-touch-icon" href="./icon-192.png">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 12px;
            overflow-x: hidden;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            padding: 16px 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        /* ── Logo ── */
        .logo-wrap { text-align: center; margin-bottom: 10px; }
        .logo-wrap img { width: 200px; max-width: 80%; height: auto; }

        /* ── Heading ── */
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 6px;
            font-size: 0.85em;
            font-weight: 900;
            line-height: 1.5;
        }
        @media (min-width: 600px) { h1 { font-size: 1.05em; } }
        @media (min-width: 900px) { h1 { font-size: 1.3em; } }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 14px;
            font-size: 0.82em;
        }

        /* ── Search ── */
        .search-box { margin-bottom: 14px; }
        .search-box input {
            width: 100%;
            padding: 11px 14px;
            font-size: 16px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            outline: none;
            transition: all 0.3s;
            background: #f9fafb;
        }
        .search-box input:focus {
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }

        /* ── Back Button ── */
        .button-container { text-align: center; margin-bottom: 8px; }
        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 30px;
            padding: 10px 22px;
            color: white;
            font-weight: 700;
            font-size: 15px;
            box-shadow: 0 4px 12px rgba(102,126,234,0.4);
            transition: transform 0.2s;
            cursor: pointer;
            border: none;
            margin-bottom: 10px;
        }
        .back-button:active { transform: scale(0.95); }

        /* ── Grid ── */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 12px;
        }

        /* ── Subject Cards ── */
        .subject-card {
            border-radius: 16px;
            padding: 18px 12px;
            text-align: center;
            cursor: pointer;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 120px;
            position: relative;
            box-shadow: 0 8px 25px rgba(0,0,0,0.25);
            border: 3px solid rgba(255,255,255,0.4);
            overflow: hidden;
            transition: transform 0.2s;
        }
        .subject-card::before {
            content: '';
            position: absolute;
            top: -50%; right: -10%;
            width: 140px; height: 140px;
            background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%);
            border-radius: 50%;
        }
        .subject-card:active {
    transform: scale(0.96);
    background: linear-gradient(135deg, #1d4ed8 0%, #1e40af 100%) !important;
    box-shadow: 0 6px 20px rgba(29,78,216,0.5);
}

        .subject-card[data-subject="english"] { background: linear-gradient(135deg, #c31432 0%, #240b36 100%); }
        .subject-card[data-subject="gk"]   { background: linear-gradient(135deg, #6a1b9a 0%, #4a148c 100%); }
        .subject-card[data-subject="law"]    { background: linear-gradient(135deg, #005c53 0%, #042940 100%); }
        .subject-card[data-subject="math"]   { background: linear-gradient(135deg, #d4a574 0%, #8b6914 100%); }
        .subject-card[data-subject="mindpower"]  { background: linear-gradient(135deg, #4a148c 0%, #311b92 100%); }
        .subject-card[data-subject="reasoning"]    { background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%); }


        .subject-name  { font-size: 1.15em; font-weight: 900; line-height: 1.2; margin-bottom: 6px; }
        .subject-odia  { font-size: 0.82em; font-weight: 700; opacity: 0.92; line-height: 1.3; }
        .subject-count { margin-top: 8px; font-size: 0.68em; font-weight: 700; background: rgba(255,255,255,0.25); padding: 3px 10px; border-radius: 12px; }

        /* ── Class Cards ── */
       .class-card {
    background: linear-gradient(135deg, #1e3a8a 0%, #1d4ed8 100%);
            border-radius: 14px;
            padding: 16px 12px;
            text-align: center;
            cursor: pointer;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 110px;
            position: relative;
            box-shadow: 0 6px 18px rgba(102,126,234,0.35);
            border: 3px solid rgba(255,255,255,0.4);
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
            overflow: hidden;
        }
        .class-card::before {
            content: '';
            position: absolute;
            top: -40%; right: -8%;
            width: 120px; height: 120px;
            background: radial-gradient(circle, rgba(255,255,255,0.12) 0%, transparent 70%);
            border-radius: 50%;
        }
    .class-card:active {
    transform: scale(0.96);
    background: linear-gradient(135deg, #1d4ed8 0%, #1e40af 100%) !important;
    box-shadow: 0 6px 20px rgba(29,78,216,0.5);
}

        .class-num   { font-size: 0.72em; font-weight: 800; letter-spacing: 1.2px; text-transform: uppercase; background: rgba(255,255,255,0.25); padding: 4px 12px; border-radius: 20px; margin-bottom: 8px; }
        .class-title { font-size: 1.0em; font-weight: 700; line-height: 1.3; padding: 0 4px; }

        /* ── Coming Soon Card ── */
.class-card.coming-soon {
    background: linear-gradient(135deg, #1e3a8a 0%, #374151 100%);
            box-shadow: 0 4px 12px rgba(100,116,139,0.3);
            cursor: default;
            border: 3px dashed rgba(255,255,255,0.45);
        }
        .coming-icon { font-size: 1.6em; margin-bottom: 6px; }
        .coming-text { font-size: 0.78em; font-weight: 700; opacity: 0.9; line-height: 1.5; }

        /* ── No Results ── */
        .no-results { text-align: center; padding: 40px 20px; color: #9ca3af; font-size: 0.95em; display: none; }

        /* ── PWA Modal ── */
        .pwa-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.75); z-index: 9000;
            justify-content: center; align-items: center; padding: 20px;
        }
        .pwa-overlay.active { display: flex; }
        .pwa-box {
            background: white; border-radius: 24px; padding: 32px 24px;
            max-width: 340px; width: 100%; text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
            border: 3px solid rgba(102,126,234,0.3);
        }
        @keyframes popIn { from { transform: scale(0.88); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .pwa-icon  { font-size: 3em; margin-bottom: 10px; }
        .pwa-title { color: #667eea; font-size: 1.4em; font-weight: 900; margin-bottom: 8px; }
        .pwa-sub   { color: #764ba2; font-size: 0.85em; font-weight: 700; margin-bottom: 18px; line-height: 1.5; }
        .pwa-install {
            display: block; width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; padding: 15px; border-radius: 14px;
            font-size: 1em; font-weight: 800; cursor: pointer; margin-bottom: 10px;
            box-shadow: 0 4px 15px rgba(102,126,234,0.5);
        }
        .pwa-dismiss { background: none; border: none; color: #aaa; font-size: 0.85em; cursor: pointer; padding: 8px; text-decoration: underline; }

        /* ── PWA Floating Button ── */
        #pwaBtn {
            display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; padding: 14px 28px; border-radius: 25px;
            font-size: 15px; font-weight: 700; cursor: pointer;
            box-shadow: 0 6px 20px rgba(102,126,234,0.5); z-index: 9999; white-space: nowrap;
        }

        /* ── Responsive ── */
        @media (min-width: 600px) {
            .container { padding: 26px 20px; max-width: 700px; margin: 0 auto; }
            .grid { gap: 14px; }
            .subject-card { min-height: 140px; }
            .class-card   { min-height: 125px; }
        }
        @media (min-width: 900px) {
            .container { max-width: 1000px; padding: 36px; }
            .grid { gap: 18px; }
            .subject-card:hover { transform: translateY(-4px); box-shadow: 0 12px 36px rgba(0,0,0,0.35); }
            .class-card:hover   { transform: translateY(-4px); box-shadow: 0 10px 28px rgba(102,126,234,0.45); }
        }
    </style>
</head>
<body>

<!-- PWA Install Modal -->
<div class="pwa-overlay" id="pwaModal">
    <div class="pwa-box">
        <div class="pwa-icon">📲</div>
        <h2 class="pwa-title">Install E-Vidya App</h2>
        <p class="pwa-sub">ଆପ୍ ଇନ୍‌ସ୍ଟଲ୍ କରନ୍ତୁ ।</p>
        <button class="pwa-install" onclick="doInstall()">⬇️ Install Now — ଇନ୍‌ସ୍ଟଲ୍ କରନ୍ତୁ</button>
        <button class="pwa-dismiss" onclick="dismissPwa()">Not Now — ପରେ କରିବି</button>
    </div>
</div>

<!-- PWA Floating Button -->
<button id="pwaBtn" onclick="doInstall()">⬇️ Install App</button>

<div class="container">



    <h1>
        📚 Special Training 📚

            <!-- Logo -->
    <div class="logo-wrap">
        <img src="https://raw.githubusercontent.com/happysangitanms/assets/main/LOGO.png" alt="E-Vidya Academy" onerror="this.style.display='none'">
    </div>
        
        🌹 Developed by E-Vidya Academy 🌹<br>
        <span style="font-size:0.9em;font-weight:700;">(A Private Educational Initiative)</span>
    </h1>

    <div class="button-container">
        <button class="back-button" id="backButton" style="display:none;">
            ← <span id="backButtonText">Back to Subjects</span>
        </button>
    </div>

    <p class="subtitle" id="subtitle">ବିଷୟ ବାଛନ୍ତୁ — Select a subject to begin</p>

    <div class="search-box">
        <input type="text" id="searchInput"
               placeholder="🔍 Search classes or subjects..."
               autocomplete="off">
    </div>

    <div class="grid" id="mainGrid"></div>
    <div class="no-results" id="noResults">No results found.</div>

</div><!-- /container -->

<script>
/* ═══════════════════════════════════════════════════════
   SUBJECTS
   To add a new subject, copy a block and fill in the
   key, name and odia fields.
═══════════════════════════════════════════════════════ */
const subjects = {
    english: { name: 'ଇଂରାଜୀ ଭାଷା', odia: 'ENGLISH' },
    math:   { name: 'ସାଧାରଣ ଗଣିତ',         odia: 'Mathematics' },
    gk:   { name: 'ସାଧାରଣ ଜ୍ଞାନ',           odia: 'General Knowledge' },
    reasoning:    { name: 'ବିଚାର ଶକ୍ତିର ବିକାଶ',         odia: 'Reasoning' },
    law:    { name: 'ଆଇନ ସଚେତନତା',         odia: 'Legal Awareness' },
    mindpower:  { name: 'ମାନସିକ ଶକ୍ତିର ବିକାଶ',             odia: 'Mind Power' }
    
};

/* ═══════════════════════════════════════════════════════
   CLASSES
   ───────────────────────────────────────────────────────
   HOW TO ADD A NEW CLASS (for teachers):

   1. Upload the class folder to GitHub, e.g.:
         /POLSCI/class-2/index.html

   2. Find the subject below (e.g. POLSCI:)

   3. Add one line inside its [ ] list:
         { num: 2, title: 'Your class title', url: './POLSCI/class-2/' },

   4. Save & push — the new card appears automatically.
   ───────────────────────────────────────────────────────
   Each entry:
   {
     num:   <class number shown on card>,
     title: '<title in Odia / English>',
     url:   '<relative path to class folder>'
   }
═══════════════════════════════════════════════════════ */
const classes = {

    english: [
        { num: 1, title: 'ସକାଳେ ନିଦରୁ ଉଠିବା', url: './english/class-1/' },
        // ── ADD MORE POLSCI CLASSES HERE ──
        // { num: 2, title: 'Your title', url: './POLSCI/class-2/' },
    ],

    gk: [
        { num: 1, title: 'ଶରୀରର ଅଙ୍ଗ', url: './gk/class-1/' },
        // ── ADD MORE HIST CLASSES HERE ──
        // { num: 2, title: 'Your title', url: './HIST/class-2/' },
    ],

    law: [
        { num: 1, title: 'ଶାସନ ବ୍ୟବସ୍ଥା', url: './law/class-1/' },
        // ── ADD MORE SOC CLASSES HERE ──
        // { num: 2, title: 'Your title', url: './SOC/class-2/' },
    ],

    math: [
        { num: 1, title: 'ସଂଖ୍ୟା - 1 ରୁ 10', url: './math/class-1/' },

        // ── ADD MORE ECON CLASSES HERE ──
        // { num: 2, title: 'Your title', url: './ECON/class-2/' },
    ],

    mindpower: [
        { num: 1, title: 'ଶରୀର, ମନ ଏବଂ ଚେତନା', url: './mindpower/class-1/' },
        // ── ADD MORE LOGIC CLASSES HERE ──
        // { num: 2, title: 'Your title', url: './LOGIC/class-2/' },
    ],

    reasoning: [
        { num: 1, title: 'ଏକା-ଅଲଗା, ସାନ-ବଡ, ଉପର-ତଳ, ଭିତର-ବାହାର', url: './reasoning/class-1/' },
        // ── ADD MORE EDU CLASSES HERE ──
        // { num: 2, title: 'Your title', url: './EDU/class-2/' },
    ]
};

/* ═══════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════ */
let view = 'subjects';
let currentSubject = null;

/* ═══════════════════════════════════════════════════════
   SHOW SUBJECTS
═══════════════════════════════════════════════════════ */
function showSubjects() {
    view = 'subjects';
    currentSubject = null;
    document.getElementById('subtitle').textContent = 'ବିଷୟ ବାଛନ୍ତୁ — Select a subject to begin';
    document.getElementById('backButton').style.display = 'none';
    document.getElementById('searchInput').value = '';
    document.getElementById('noResults').style.display = 'none';

    const grid = document.getElementById('mainGrid');
    grid.innerHTML = '';

    for (const key in subjects) {
        const sub   = subjects[key];
        const count = (classes[key] || []).length;

        const card = document.createElement('div');
        card.className = 'subject-card';
        card.setAttribute('data-subject', key);
        card.setAttribute('data-search', (sub.name + ' ' + sub.odia).toLowerCase());
        card.onclick = () => showClasses(key);
        card.innerHTML = `
            <div class="subject-name">${sub.name}</div>
            <div class="subject-odia">${sub.odia}</div>
            <div class="subject-count">${count} Class${count !== 1 ? 'es' : ''} Available</div>
        `;
        grid.appendChild(card);
    }
}

/* ═══════════════════════════════════════════════════════
   SHOW CLASSES FOR A SUBJECT
═══════════════════════════════════════════════════════ */
function showClasses(subjectKey) {
    view = 'classes';
    currentSubject = subjectKey;

    const sub = subjects[subjectKey];
    document.getElementById('subtitle').textContent = sub.name + ' (' + sub.odia + ')';
    document.getElementById('backButton').style.display = 'inline-flex';
    document.getElementById('backButtonText').textContent = 'Back to Subjects';
    document.getElementById('searchInput').value = '';
    document.getElementById('noResults').style.display = 'none';

    const grid = document.getElementById('mainGrid');
    grid.innerHTML = '';

    const list = classes[subjectKey] || [];
    list.forEach(cls => grid.appendChild(makeClassCard(cls)));

    // Always show "Coming Soon" at the end
    grid.appendChild(makeComingSoonCard());
}

/* ── Live class card ── */
function makeClassCard(cls) {
    const a = document.createElement('a');
    a.className = 'class-card';
    a.href = cls.url;
    a.setAttribute('data-search', ('class ' + cls.num + ' ' + cls.title).toLowerCase());
    a.innerHTML = `
        <div class="class-num">Class ${cls.num}</div>
        <div class="class-title">${cls.title}</div>
    `;
    return a;
}

/* ── Coming soon placeholder ── */
function makeComingSoonCard() {
    const div = document.createElement('div');
    div.className = 'class-card coming-soon';
    div.innerHTML = `
        <div class="coming-icon">🔜</div>
        <div class="class-num">Next Class</div>
        <div class="coming-text">Coming Soon<br>ଶୀଘ୍ର ଆସୁଛି...</div>
    `;
    return div;
}

/* ═══════════════════════════════════════════════════════
   BACK BUTTON
═══════════════════════════════════════════════════════ */
document.getElementById('backButton').addEventListener('click', () => {
    if (view === 'classes') showSubjects();
});

/* ═══════════════════════════════════════════════════════
   SEARCH
═══════════════════════════════════════════════════════ */
document.getElementById('searchInput').addEventListener('input', function () {
    const q = this.value.toLowerCase().trim();
    const noResults = document.getElementById('noResults');
    if (!q) {
        document.querySelectorAll('[data-search]').forEach(c => c.style.display = '');
        noResults.style.display = 'none';
        return;
    }
    let found = 0;
    document.querySelectorAll('[data-search]').forEach(c => {
        const match = c.getAttribute('data-search').includes(q);
        c.style.display = match ? '' : 'none';
        if (match) found++;
    });
    noResults.style.display = found ? 'none' : 'block';
});

/* ═══════════════════════════════════════════════════════
   PWA
═══════════════════════════════════════════════════════ */
let deferredPrompt;

window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('pwaBtn').style.display = 'block';
    setTimeout(() => document.getElementById('pwaModal').classList.add('active'), 2500);
});

function doInstall() {
    dismissPwa();
    if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(r => {
            if (r.outcome === 'accepted') document.getElementById('pwaBtn').style.display = 'none';
            deferredPrompt = null;
        });
    }
}

function dismissPwa() {
    document.getElementById('pwaModal').classList.remove('active');
}

window.addEventListener('appinstalled', () => {
    document.getElementById('pwaBtn').style.display = 'none';
    dismissPwa();
    deferredPrompt = null;
});

/* ═══════════════════════════════════════════════════════
   SERVICE WORKER
═══════════════════════════════════════════════════════ */
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
            .then(r => console.log('SW registered:', r.scope))
            .catch(e => console.log('SW error:', e));
    });
}

/* ═══════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════ */
showSubjects();
</script>

</body>
</html>
