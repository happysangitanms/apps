
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }

#chat-root {
  max-width: 420px;
  margin: 0 auto;
  background: var(--color-background-tertiary);
  min-height: 600px;
  border-radius: var(--border-radius-lg);
  border: 0.5px solid var(--color-border-tertiary);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.chat-header {
  background: #1D9E75;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.avatar {
  width: 44px; height: 44px; border-radius: 50%;
  background: #E1F5EE;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0;
}

.header-text { flex: 1; }
.header-name { font-size: 15px; font-weight: 500; color: #fff; }
.header-sub { font-size: 12px; color: #9FE1CB; }

.status-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: #5DCAA5; border: 2px solid #1D9E75;
}

.messages {
  flex: 1; overflow-y: auto; padding: 16px 12px;
  display: flex; flex-direction: column; gap: 10px;
  min-height: 400px; max-height: 500px;
}

.bubble-row {
  display: flex; align-items: flex-end; gap: 8px;
  animation: fadeUp 0.35s ease;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.bubble-row.teacher { flex-direction: row; }
.bubble-row.student { flex-direction: row-reverse; }

.mini-avatar {
  width: 30px; height: 30px; border-radius: 50%;
  background: #E1F5EE; display: flex;
  align-items: center; justify-content: center;
  font-size: 15px; flex-shrink: 0;
}

.bubble {
  max-width: 78%; padding: 10px 14px;
  border-radius: 18px; font-size: 14px; line-height: 1.55;
  color: var(--color-text-primary);
}

.bubble.teacher {
  background: var(--color-background-primary);
  border: 0.5px solid var(--color-border-tertiary);
  border-bottom-left-radius: 4px;
}

.bubble.student {
  background: #1D9E75; color: #fff;
  border-bottom-right-radius: 4px;
}

.bubble.correct-bubble {
  background: #EAF3DE;
  border: 0.5px solid #97C459;
  color: #3B6D11;
}

.bubble.wrong-bubble {
  background: #FCEBEB;
  border: 0.5px solid #F09595;
  color: #A32D2D;
}

.bubble.encourage-bubble {
  background: #FAEEDA;
  border: 0.5px solid #FAC775;
  color: #854F0B;
}

.odia-text {
  font-size: 13px; color: var(--color-text-secondary);
  margin-top: 4px;
}

.options-area {
  padding: 10px 12px 14px;
  display: flex; flex-direction: column; gap: 8px;
  border-top: 0.5px solid var(--color-border-tertiary);
  background: var(--color-background-primary);
}

.opt-btn {
  width: 100%; padding: 11px 16px;
  background: var(--color-background-primary);
  border: 0.5px solid var(--color-border-secondary);
  border-radius: var(--border-radius-md);
  font-size: 14px; cursor: pointer;
  text-align: left; color: var(--color-text-primary);
  transition: background 0.15s, border-color 0.15s;
  font-family: var(--font-sans);
  display: flex; align-items: center; gap: 10px;
}

.opt-btn:hover { background: var(--color-background-secondary); border-color: var(--color-border-primary); }
.opt-btn:active { transform: scale(0.98); }

.opt-btn .opt-icon {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--color-background-secondary);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; flex-shrink: 0;
}

.opt-btn.correct-btn { background: #EAF3DE; border-color: #97C459; }
.opt-btn.wrong-btn { background: #FCEBEB; border-color: #F09595; }

.progress-bar {
  height: 3px; background: var(--color-border-tertiary);
  margin: 0 12px 0;
}
.progress-fill {
  height: 100%; background: #1D9E75;
  border-radius: 2px; transition: width 0.5s ease;
}

.score-badge {
  font-size: 12px; color: #9FE1CB;
  padding: 3px 10px;
  background: rgba(29,158,117,0.3);
  border-radius: 20px;
}

.typing-indicator {
  display: flex; gap: 4px; padding: 12px 14px;
  background: var(--color-background-primary);
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: 18px; border-bottom-left-radius: 4px;
  width: fit-content;
}
.typing-indicator span {
  width: 7px; height: 7px; border-radius: 50%;
  background: #5DCAA5; animation: bounce 1.2s infinite;
}
.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce {
  0%, 60%, 100% { transform: translateY(0); }
  30% { transform: translateY(-6px); }
}

.confetti-text { font-size: 18px; }
.stars { color: #EF9F27; }
</style>

<div id="chat-root">
  <div class="chat-header">
    <div class="avatar">👩‍🏫</div>
    <div class="header-text">
      <div class="header-name">Teacher Priya</div>
      <div class="header-sub">English for Beginners — Day 1</div>
    </div>
    <div class="score-badge" id="score-badge">0 / 0</div>
  </div>

  <div class="progress-bar">
    <div class="progress-fill" id="progress" style="width:0%"></div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="options-area" id="options-area"></div>
</div>

<script>
const M = document.getElementById('messages');
const OA = document.getElementById('options-area');
const PB = document.getElementById('progress');
const SB = document.getElementById('score-badge');

let score = 0;
let total = 0;
let currentQ = 0;

const questions = [
  {
    q: "I ___ up early.",

      { text: "wakes", odia: "wakes (ଭୁଲ)", type: "wrong" },

    correct: "wake",
    praise: "🌟 Excellent! Perfect answer!\nI = WAKE ✅\nRemember: I, We, You, Boys → WAKE (no S!)\n\nଶାବାସ! ତୁମେ ଠିକ୍ ଉତ୍ତର ଦେଲ!",
    wrongExp: "❌ Not quite!\n'wakes' is used only with He/She.\nI, We, You, Boys → use WAKE (no S)\n\nCorrect: I wake up early.\nମୁଁ ସକାଳୁ ଉଠେ ।",
    idkExp: "💛 That's okay! Let me help you!\nThe rule is simple:\nI → WAKE (no S needed)\n\nSo we say: I wake up early!\nମୁଁ ସକାଳୁ ଉଠେ । Try to remember this! 😊"
  },
  {
    q: "He ___ up at 5 daily.",
    odia: "ସେ (ପୁଅ) _____ ପ୍ରତିଦିନ ୫ ଟାରେ ଉଠେ ।",
    opts: [
      { text: "wake", odia: "wake (ଭୁଲ)", type: "wrong" },
      { text: "wakes", odia: "wakes (ଠିକ୍)", type: "correct" },
      { text: "I don't know", odia: "ମୁଁ ଜାଣେ ନାହିଁ", type: "idk" }
    ],
    correct: "wakes",
    praise: "🎉 Brilliant! You got it!\nHe = WAKES ✅\nHe/She → always add S at the end!\n\nବହୁ ଭଲ! ତୁମେ ଜ୍ଞାନୀ ଛାତ୍ର!",
    wrongExp: "❌ Not correct!\n'wake' is used with I, We, You, Boys.\nBut He/She → always WAKES (add S!)\n\nCorrect: He wakes up at 5 daily.\nସେ ପ୍ରତିଦିନ ୫ ଟାରେ ଉଠେ ।",
    idkExp: "💛 No worries at all!\nHe and She are special!\nAlways add S → He WAKES, She WAKES\n\nCorrect: He wakes up at 5 daily.\nସେ ପ୍ରତିଦିନ ୫ ଟାରେ ଉଠେ । You can do it! 🌸"
  },
  {
    q: "Boys ___ up at sunrise.",
    odia: "ବାଳକମାନେ _____ ସୂର୍ଯ୍ୟ ଉଦୟରେ ଉଠନ୍ତି ।",
    opts: [
      { text: "wakes", odia: "wakes (ଭୁଲ)", type: "wrong" },
      { text: "wake", odia: "wake (ଠିକ୍)", type: "correct" },
      { text: "I don't know", odia: "ମୁଁ ଜାଣେ ନାହିଁ", type: "idk" }
    ],
    correct: "wake",
    praise: "⭐ Amazing! You are learning fast!\nBoys = WAKE ✅\nPlural words → WAKE (no S)\n\nତୁମେ ଅସ୍ଥି! ଚାଲୁ ରଖ!",
    wrongExp: "❌ Try again next time!\n'wakes' only with He/She.\nBoys is plural → use WAKE (no S!)\n\nCorrect: Boys wake up at sunrise.\nବାଳକମାନେ ସୂର୍ଯ୍ୟ ଉଦୟରେ ଉଠନ୍ତି ।",
    idkExp: "💛 Let me make it easy!\nBoys = many people = Plural\nPlural → always WAKE (no S!)\n\nCorrect: Boys wake up at sunrise.\nବାଳକମାନେ ସୂର୍ଯ୍ୟ ଉଦୟରେ ଉଠନ୍ତି । Great effort! 💪"
  },
  {
    q: "She ___ up feeling very happy.",
    odia: "ସେ (ଝିଅ) _____ ବହୁତ ଖୁସି ଅନୁଭବ କରି ଉଠେ ।",
    opts: [
      { text: "wakes", odia: "wakes (ଠିକ୍)", type: "correct" },
      { text: "wake", odia: "wake (ଭୁଲ)", type: "wrong" },
      { text: "I don't know", odia: "ମୁଁ ଜାଣେ ନାହିଁ", type: "idk" }
    ],
    correct: "wakes",
    praise: "🌺 Wonderful! You remembered!\nShe = WAKES ✅\nShe/He → S at the end, always!\n\nବହୁ ସୁନ୍ଦର! ତୁମ ଶ୍ରଦ୍ଧା ଦେଖ!",
    wrongExp: "❌ So close! Keep trying!\n'wake' is for I, We, You, Boys.\nShe → always WAKES (don't forget S!)\n\nCorrect: She wakes up feeling very happy.\nସେ ବହୁତ ଖୁସି ଅନୁଭବ କରି ଉଠେ ।",
    idkExp: "💛 You are doing great!\nShe = special rule = add S\nShe WAKES → always!\n\nCorrect: She wakes up feeling very happy.\nସେ ବହୁତ ଖୁସି ଅନୁଭବ କରି ଉଠେ । Keep going! 🌟"
  },
  {
    q: "We ___ up every morning.",
    odia: "ଆମେ _____ ପ୍ରତ୍ୟେକ ସକାଳୁ ଉଠୁ ।",
    opts: [
      { text: "wakes", odia: "wakes (ଭୁଲ)", type: "wrong" },
      { text: "wake", odia: "wake (ଠିକ୍)", type: "correct" },
      { text: "I don't know", odia: "ମୁଁ ଜାଣେ ନାହିଁ", type: "idk" }
    ],
    correct: "wake",
    praise: "🏆 Superstar! Perfect!\nWe = WAKE ✅\nWe, You, They, Boys → WAKE (no S)\n\nତୁମେ ଚ୍ୟାମ୍ପିଅନ! ଶାବାସ!",
    wrongExp: "❌ Almost there!\n'wakes' is only for He/She.\nWe is plural → use WAKE (no S!)\n\nCorrect: We wake up every morning.\nଆମେ ପ୍ରତ୍ୟେକ ସକାଳୁ ଉଠୁ ।",
    idkExp: "💛 You are trying so well!\nWe = group of people = Plural\nPlural → WAKE (no S needed!)\n\nCorrect: We wake up every morning.\nଆମେ ପ୍ରତ୍ୟେକ ସକାଳୁ ଉଠୁ । Well done for trying! 🌻"
  }
];

function addMessage(html, side, type = '') {
  const row = document.createElement('div');
  row.className = `bubble-row ${side}`;
  const av = document.createElement('div');
  av.className = 'mini-avatar';
  av.textContent = side === 'teacher' ? '👩‍🏫' : '🧑';
  const bub = document.createElement('div');
  bub.className = `bubble ${side} ${type}`;
  bub.innerHTML = html.replace(/\n/g, '<br>');
  if (side === 'teacher') row.append(av, bub);
  else row.append(bub, av);
  M.appendChild(row);
  M.scrollTop = M.scrollHeight;
  return row;
}

function addTyping() {
  const row = document.createElement('div');
  row.className = 'bubble-row teacher';
  row.id = 'typing-row';
  const av = document.createElement('div');
  av.className = 'mini-avatar';
  av.textContent = '👩‍🏫';
  const t = document.createElement('div');
  t.className = 'typing-indicator';
  t.innerHTML = '<span></span><span></span><span></span>';
  row.append(av, t);
  M.appendChild(row);
  M.scrollTop = M.scrollHeight;
  return row;
}

function removeTyping() {
  const t = document.getElementById('typing-row');
  if (t) t.remove();
}

function setOptions(opts) {
  OA.innerHTML = '';
  opts.forEach(o => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    const ico = document.createElement('div');
    ico.className = 'opt-icon';
    ico.textContent = o.icon || '❓';
    btn.append(ico);
    const span = document.createElement('span');
    span.innerHTML = `<strong>${o.label}</strong>${o.sub ? `<br><span style="font-size:12px;color:var(--color-text-secondary)">${o.sub}</span>` : ''}`;
    btn.append(span);
    btn.onclick = o.action;
    OA.appendChild(btn);
  });
}

function clearOptions() { OA.innerHTML = ''; }

function updateScore() {
  SB.textContent = `${score} / ${total}`;
  PB.style.width = `${(currentQ / questions.length) * 100}%`;
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

async function teacherSay(html, type = '', wait = 900) {
  const t = addTyping();
  await delay(wait);
  removeTyping();
  addMessage(html, 'teacher', type);
  M.scrollTop = M.scrollHeight;
}

async function askQuestion(idx) {
  if (idx >= questions.length) {
    await endLesson();
    return;
  }
  currentQ = idx + 1;
  updateScore();
  const q = questions[idx];
  await teacherSay(
    `<strong>Question ${idx + 1} of ${questions.length}</strong><br><br>Fill in the blank:<br><span style="font-size:16px;font-weight:500">${q.q}</span><br><span class="odia-text">${q.odia}</span>`,
    '', 1000
  );
  await delay(200);
  setOptions(q.opts.map(o => ({
    icon: o.type === 'correct' ? '🔵' : o.type === 'idk' ? '🤷' : '🔵',
    label: o.text,
    sub: o.odia,
    action: () => handleAnswer(o, q, idx)
  })));
}

async function handleAnswer(opt, q, idx) {
  clearOptions();
  total++;
  addMessage(opt.text, 'student');
  await delay(400);
  if (opt.type === 'correct') {
    score++;
    updateScore();
    await teacherSay(q.praise, 'correct-bubble', 800);
    await delay(600);
    await teacherSay('Ready for the next question? 😊<br><span class="odia-text">ପ୍ରସ୍ତୁତ? ଆଗକୁ ଯିବା!</span>', '', 600);
    await delay(300);
    setOptions([{
      icon: '➡️', label: 'Yes! Next question →',
      sub: 'ହଁ! ଆଗକୁ ଯିବା',
      action: () => { clearOptions(); askQuestion(idx + 1); }
    }]);
  } else if (opt.type === 'wrong') {
    updateScore();
    await teacherSay(q.wrongExp, 'wrong-bubble', 900);
    await delay(500);
    await teacherSay("Don't worry! Mistakes help us learn. Let's continue! 💪<br><span class='odia-text'>ଚିନ୍ତା କର ନାହିଁ! ଆଗକୁ ଯିବା!</span>", '', 700);
    await delay(300);
    setOptions([{
      icon: '➡️', label: 'Continue →',
      sub: 'ଆଗକୁ ଯିବା',
      action: () => { clearOptions(); askQuestion(idx + 1); }
    }]);
  } else {
    updateScore();
    await teacherSay(q.idkExp, 'encourage-bubble', 900);
    await delay(500);
    await teacherSay("That's perfectly fine! Learning takes time. You are doing great! 🌸<br><span class='odia-text'>ଏହା ଏକଦମ ଠିକ ଅଛି! ତୁମେ ଭଲ ଶିଖୁଛ!</span>", '', 700);
    await delay(300);
    setOptions([{
      icon: '➡️', label: 'I understand! Next →',
      sub: 'ବୁଝି ଗଲି! ଆଗକୁ',
      action: () => { clearOptions(); askQuestion(idx + 1); }
    }]);
  }
}

async function endLesson() {
  PB.style.width = '100%';
  const pct = Math.round((score / questions.length) * 100);
  let msg, type;
  if (pct >= 80) {
    msg = `🏆 Outstanding! You scored ${score} out of ${questions.length}!\n\nYou are a champion student! 🌟\nWAKE/WAKES rule is now yours!\n\nଶାବାସ! ତୁମେ ଆଜି ବହୁ ଭଲ ଶିଖିଲ!`;
    type = 'correct-bubble';
  } else if (pct >= 50) {
    msg = `🌻 Good effort! You scored ${score} out of ${questions.length}!\n\nYou are improving! Practice once more! 💪\n\nଭଲ ପ୍ରୟାସ! ଆଉ ଥରେ ଅଭ୍ୟାସ କର!`;
    type = 'encourage-bubble';
  } else {
    msg = `💛 Don't worry! You scored ${score} out of ${questions.length}.\n\nEvery expert was once a beginner!\nLet's practice again together! 🌸\n\nଚିନ୍ତା ନ କର! ଆଉ ଥରେ ଅଭ୍ୟାସ କରିବା!`;
    type = 'encourage-bubble';
  }
  await teacherSay(msg, type, 1000);
  await delay(600);
  await teacherSay("📚 Today's big lesson:\n<strong>He/She → WAKES</strong> (add S!)\n<strong>I/We/You/Boys → WAKE</strong> (no S!)\n\nSee you in Day 2 — Brushing Teeth! 🪥\n<span class='odia-text'>ଆସ, ଆଗକୁ ଶିଖିବା!</span>", '', 800);
  await delay(400);
  setOptions([{
    icon: '🔄', label: 'Practice again!',
    sub: 'ଆଉ ଥରେ ଖେଳ',
    action: () => {
      score = 0; total = 0; currentQ = 0;
      M.innerHTML = ''; OA.innerHTML = '';
      PB.style.width = '0%';
      updateScore();
      startLesson();
    }
  }]);
}

async function startLesson() {
  await teacherSay("🙏 Namaste! Welcome to English Class!\n<span class='odia-text'>ନମସ୍କାର! ଇଂରାଜୀ ଶ୍ରେଣୀକୁ ସ୍ୱାଗତ!</span>", '', 600);
  await teacherSay("I am Teacher Priya. Today we learn <strong>WAKE UP</strong>! 🌅\n<span class='odia-text'>ଆଜି ଆମେ WAKE UP ଶିଖିବା ।</span>", '', 1000);
  await teacherSay("The big rule:\n<strong>He/She → WAKES</strong> (S ଲାଗେ)\n<strong>I/We/You/Boys → WAKE</strong> (S ଲାଗେ ନାହିଁ)\n<span class='odia-text'>ଏହା ମନେ ରଖ!</span>", '', 1200);
  await teacherSay("Are you ready to learn with me? 😊\n<span class='odia-text'>ଆମ ସହ ଶିଖିବ?</span>", '', 800);
  setOptions([
    {
      icon: '✅', label: "Yes! I am ready!",
      sub: 'ହଁ! ମୁଁ ପ୍ରସ୍ତୁତ!',
      action: async () => {
        clearOptions();
        addMessage("Yes! I am ready! ✅", 'student');
        await delay(300);
        await teacherSay("Wonderful! Let's start! 🎉\n<span class='odia-text'>ଶୁଭ ହେଉ! ଆରମ୍ଭ କରିବା!</span>", 'correct-bubble', 700);
        await delay(400);
        askQuestion(0);
      }
    },
    {
      icon: '⏳', label: "Wait, not yet...",
      sub: 'ଅଲ୍ପ ଅପେକ୍ଷା',
      action: async () => {
        clearOptions();
        addMessage("Wait, not yet...", 'student');
        await delay(300);
        await teacherSay("That's okay! Take your time. 🌸\nI will wait for you!\n<span class='odia-text'>ଠିକ ଅଛି! ମୁଁ ଅପେକ୍ଷା କରୁଛି!</span>", 'encourage-bubble', 700);
        await delay(400);
        await teacherSay("Ready now? Let's begin! 😊\n<span class='odia-text'>ଏବେ ପ୍ରସ୍ତୁତ?</span>", '', 800);
        setOptions([{
