<script>
const chat=document.getElementById('chat'),opanel=document.getElementById('opanel'),pfill=document.getElementById('pfill'),slabel=document.getElementById('slabel'),hstatus=document.getElementById('hstatus'),clkEl=document.getElementById('clk');
function tick(){const d=new Date();clkEl.textContent=d.getHours()+':'+String(d.getMinutes()).padStart(2,'0');}
tick();setInterval(tick,30000);
const delay=ms=>new Promise(r=>setTimeout(r,ms));

/* ── SPEECH ── */
function speak(text,onEnd){
  window.speechSynthesis&&window.speechSynthesis.cancel();
  const voices=(window.speechSynthesis&&window.speechSynthesis.getVoices())||[];
  const v=voices.find(x=>(x.name.includes('Samantha')||x.name.includes('Karen')||x.name.includes('Victoria')||x.name.includes('Zira'))&&x.lang.startsWith('en'))
    ||voices.find(x=>x.lang.startsWith('en-'))||voices[0];
  const u=new SpeechSynthesisUtterance(text);
  if(v)u.voice=v;u.rate=0.87;u.pitch=1.1;u.volume=1;
  u.onend=()=>{hstatus.textContent='online';if(onEnd)onEnd();};
  u.onerror=()=>{hstatus.textContent='online';if(onEnd)onEnd();};
  hstatus.textContent='speaking...';
  window.speechSynthesis&&window.speechSynthesis.speak(u);
  return u;
}

/* ── WAVE ── */
function drawWave(cvs,active){
  const W=cvs.width=cvs.offsetWidth||130,H=cvs.height=26;
  const ctx=cvs.getContext('2d');ctx.clearRect(0,0,W,H);
  for(let i=0;i<22;i++){
    const h=active?4+Math.abs(Math.sin(i*0.7+Date.now()*0.009))*14:2+Math.abs(Math.sin(i*0.9))*8;
    ctx.fillStyle=active?'#25D366':'#B0BEC5';
    const x=i*5.5,y=(H-h)/2;
    ctx.beginPath();ctx.roundRect?ctx.roundRect(x,y,3,h,2):ctx.rect(x,y,3,h);ctx.fill();
  }
}
function animWave(cvs,btn,secs){
  const start=Date.now();
  function f(){if(!btn.classList.contains('playing')||(Date.now()-start)/1000>=secs){drawWave(cvs,false);return;}drawWave(cvs,true);requestAnimationFrame(f);}
  requestAnimationFrame(f);
}

/* ── COMBINED TEXT+VOICE BUBBLE ── */
function addComboMsg(htmlText,speechText,cls=''){
  const row=document.createElement('div');row.className='mrow t';
  const bub=document.createElement('div');bub.className='bub t '+(cls||'');
  const txt=document.createElement('div');txt.className='combo-text';txt.innerHTML=htmlText;
  const vb=document.createElement('div');vb.className='vbub';
  const btn=document.createElement('button');btn.className='vplay';btn.textContent='▶';
  const wd=document.createElement('div');wd.className='vwave';
  const cvs=document.createElement('canvas');wd.appendChild(cvs);
  const secs=Math.max(2,Math.round(speechText.split(' ').length/2.0));
  const dur=document.createElement('span');dur.className='vdur';dur.textContent='0:'+String(secs).padStart(2,'0');
  vb.append(btn,wd,dur);
  const tm=document.createElement('div');tm.className='btime';
  const d=new Date();tm.textContent=d.getHours()+':'+String(d.getMinutes()).padStart(2,'0');
  bub.append(txt,vb,tm);row.appendChild(bub);chat.appendChild(row);
  chat.scrollTop=chat.scrollHeight;
  setTimeout(()=>drawWave(cvs,false),80);
  btn.onclick=()=>{
    if(btn.classList.contains('playing')){window.speechSynthesis&&window.speechSynthesis.cancel();btn.textContent='▶';btn.classList.remove('playing');drawWave(cvs,false);}
    else{btn.textContent='⏸';btn.classList.add('playing');animWave(cvs,btn,secs);speak(speechText,()=>{btn.textContent='▶';btn.classList.remove('playing');drawWave(cvs,false);});}
  };
  return{btn,cvs,secs};
}

/* ── STUDENT TEXT BUBBLE ── */
function addStudentBub(text,isWrite=false){
  const row=document.createElement('div');row.className='mrow s';
  const bub=document.createElement('div');bub.className='bub s'+(isWrite?' s-write':'');
  bub.innerHTML=text;
  const tm=document.createElement('div');tm.className='btime';
  const d=new Date();tm.innerHTML=d.getHours()+':'+String(d.getMinutes()).padStart(2,'0')+' <span class="tick">✓✓</span>';
  bub.appendChild(tm);row.appendChild(bub);chat.appendChild(row);chat.scrollTop=chat.scrollHeight;
}

/* ── LESSON CHIP ── */
function addLessonChip(t){const d=document.createElement('div');d.className='lesson-chip';d.innerHTML='<span>'+t+'</span>';chat.appendChild(d);chat.scrollTop=chat.scrollHeight;}

/* ── TYPING ── */
function showTyping(){
  const row=document.createElement('div');row.className='typing-row';row.id='typing';
  const tb=document.createElement('div');tb.className='tbub';tb.innerHTML='<span></span><span></span><span></span>';
  row.appendChild(tb);chat.appendChild(row);chat.scrollTop=chat.scrollHeight;
  hstatus.textContent='typing...';
}
function hideTyping(){const t=document.getElementById('typing');if(t)t.remove();hstatus.textContent='online';}

/* ── TEACHER SAYS (text+audio autoplay) ── */
async function teacherSay(htmlText,speechText,cls='',waitBefore=500){
  await delay(waitBefore);showTyping();await delay(700);hideTyping();
  const {btn,cvs,secs}=addComboMsg(htmlText,speechText,cls);
  btn.textContent='⏸';btn.classList.add('playing');animWave(cvs,btn,secs);
  return new Promise(res=>speak(speechText,()=>{btn.textContent='▶';btn.classList.remove('playing');drawWave(cvs,false);res();}));
}

/* ── SET OPTIONS ── */
function setOpts(opts){
  opanel.innerHTML='';
  opts.forEach((o,i)=>{
    const btn=document.createElement('button');btn.className='obtn '+(o.cls||'');
    btn.innerHTML=`<div class="onum">${i+1}</div><div class="otxt">${o.text}<span class="osub">${o.sub||''}</span></div>`;
    btn.onclick=()=>{document.querySelectorAll('.obtn').forEach(b=>b.classList.add('disabled'));o.fn(btn);};
    opanel.appendChild(btn);
  });
}
function clearOpts(){opanel.innerHTML='';}

/* ── FILL IN BLANK ── */
function showFIB(qHTML,odiaHint,correctAnswers,onCorrect,onWrong){
  opanel.innerHTML='';
  const box=document.createElement('div');box.className='fib-box';
  const q=document.createElement('div');q.className='fib-q';q.innerHTML=qHTML;
  const hint=document.createElement('div');hint.className='fib-hint';hint.textContent=odiaHint;
  const row=document.createElement('div');row.className='fib-row';
  const inp=document.createElement('input');inp.className='fib-input';inp.placeholder='Type your answer here...';inp.autocomplete='off';inp.autocorrect='off';inp.autocapitalize='off';inp.spellcheck=false;
  const sub=document.createElement('button');sub.className='fib-submit';sub.textContent='Submit ➤';
  row.append(inp,sub);
  box.append(q,hint,row);
  opanel.appendChild(box);
  inp.focus();
  function check(){
    const val=inp.value.trim().toLowerCase().replace(/[^a-z]/g,'');
    const correct=correctAnswers.some(a=>a.toLowerCase()===val);
    if(!val) return;
    inp.disabled=true;sub.disabled=true;
    if(correct){inp.classList.add('correct');addStudentBub('✍️ '+inp.value.trim(),true);setTimeout(()=>{clearOpts();onCorrect();},600);}
    else{inp.classList.add('wrong');setTimeout(()=>{clearOpts();onWrong(inp.value.trim());},600);}
  }
  sub.onclick=check;
  inp.onkeydown=e=>{if(e.key==='Enter')check();};
}

function updateProgress(n){pfill.style.width=(n/4*100)+'%';slabel.textContent='Lesson '+n+'/4';}

async function runExQs(exQs,afterFn){
  for(let i=0;i<exQs.length;i++){
    const q=exQs[i];
    await teacherSay(q.html,q.speech,'',400);
    await delay(200);
    await new Promise(res=>{
      setOpts(q.opts.map((o,idx)=>({
        text:o.text,sub:o.sub,
        cls:'opt-'+(idx===0?'a':idx===1?'b':'c'),
        fn:async()=>{
          addStudentBub(o.text+' 👆');clearOpts();
          if(o.type==='correct') await teacherSay(q.praise.html,q.praise.speech,'praise',400);
          else if(o.type==='wrong') await teacherSay(q.wrongFb.html,q.wrongFb.speech,'wrong',400);
          else await teacherSay(q.idkFb.html,q.idkFb.speech,'idk',400);
          await delay(300);
          if(i<exQs.length-1){setOpts([{text:'Next Example →',sub:'',cls:'got',fn:()=>{clearOpts();res();}}]);}
          else res();
        }
      })));
    });
  }
  await delay(200);afterFn();
}

async function runLesson(idx){
  if(idx>=LESSONS.length){finalEnd();return;}
  const L=LESSONS[idx];
  pfill.style.width=((idx+1)/4*100)+'%';
  slabel.textContent='Lesson '+(idx+1)+'/4';
  addLessonChip(L.chip);

  /* TEACH */
  await teacherSay(L.teach.html,L.teach.speech,'info',400);
  await delay(300);

  /* UNDERSTOOD? */
  await teacherSay(L.understandQ.html,L.understandQ.speech,'',400);
  await delay(200);

  const understood=await new Promise(res=>{
    setOpts([
      {text:'✅  ହଁ, ବୁଝ ଗଲି!',sub:'Yes, I understood!',cls:'got',fn:async()=>{addStudentBub('✅ ହଁ, ବୁଝ ଗଲି!');clearOpts();res(true);}},
      {text:'❌  ଆଉ ଥରେ ବୁଝାଅ',sub:'Please explain again',cls:'notgot',fn:async()=>{
        addStudentBub('❌ ଆଉ ଥରେ ବୁଝାଅ');clearOpts();
        await teacherSay('💛 <strong>ଠିକ ଅଛି! ଆଉ ଥରେ ଶୁଣ:</strong>','No problem at all! Let me explain once more very carefully.','idk',400);
        await delay(200);
        await teacherSay(L.teach.html,L.teach.speech,'info',300);
        await delay(300);
        setOpts([{text:'✅  ଏବେ ବୁଝ ଗଲି!',sub:'Got it now!',cls:'got',fn:async()=>{addStudentBub('✅ ଏବେ ବୁଝ ଗଲି!');clearOpts();res(true);}}]);
      }}
    ]);
  });

  /* QUICK CHECK */
  await teacherSay(L.checkQ.html,L.checkQ.speech,'',400);
  await delay(200);

  await new Promise(res=>{
    const doCheck=()=>{
      setOpts(L.checkOpts.map((o,i)=>({
        text:o.text,sub:o.sub,
        cls:'opt-'+(i===0?'a':i===1?'b':'c'),
        fn:async()=>{
          addStudentBub(o.text+' 👆');clearOpts();
          if(o.type==='correct'){
            await teacherSay(L.praise.html,L.praise.speech,'praise',400);
            await delay(300);
            setOpts([{text:'Continue →',sub:'',cls:'got',fn:()=>{clearOpts();res();}}]);
          } else if(o.type==='wrong'){
            await teacherSay(L.wrongFb.html,L.wrongFb.speech,'wrong',400);
            await delay(200);
            await teacherSay(L.teach.html,L.teach.speech,'info',300);
            await delay(300);
            await teacherSay('🔄 <strong>ଆଉ ଥରେ ଚେଷ୍ଟା କର!</strong>','Try the check question one more time!','',400);
            await delay(200);
            await teacherSay(L.checkQ.html,L.checkQ.speech,'',400);
            await delay(200);
            doCheck();
          } else {
            await teacherSay(L.idkFb.html,L.idkFb.speech,'idk',400);
            await delay(300);
            setOpts([{text:'Continue →',sub:'',cls:'got',fn:()=>{clearOpts();res();}}]);
          }
        }
      })));
    };
    doCheck();
  });

  /* FILL IN BLANK */
  await teacherSay(L.fibQ.html,L.fibQ.speech,'',400);
  await delay(300);
  await new Promise(res=>{
    showFIB(L.fibQ.html,L.fibQ.hint,L.fibQ.correct,
      async()=>{await teacherSay(L.fibPraise.html,L.fibPraise.speech,'praise',400);await delay(300);setOpts([{text:'Next →',sub:'',cls:'got',fn:()=>{clearOpts();res();}}]);},
      async(written)=>{await teacherSay(L.fibWrong.html,L.fibWrong.speech,'wrong',400);await delay(300);setOpts([{text:'Continue →',sub:'',cls:'got',fn:()=>{clearOpts();res();}}]);}
    );
  });

  /* EXAMPLE QUESTIONS */
  await teacherSay('🎯 <strong>ଏবে 3 ଟି Example Questions!</strong><br><span class="odia">Let me test your understanding with examples!</span>','Great! Now I will ask you 3 example questions. Ready?','',400);
  await delay(200);
  await new Promise(res=>{
    setOpts([{text:'✅  Ready! Ask me!',sub:'ହଁ, ପ୍ରଶ୍ନ କର',cls:'got',
      fn:async()=>{addStudentBub('✅ Ready! Ask me!');clearOpts();
        await runExQs(L.exQs,res);
      }}]);
  });

  /* NEXT LESSON */
  if(idx<LESSONS.length-1){
    await delay(300);
    setOpts([{text:'▶ Next Lesson →',sub:'ଆଗ ପାଠ',cls:'got',fn:()=>{clearOpts();runLesson(idx+1);}}]);
  } else {finalEnd();}
}
