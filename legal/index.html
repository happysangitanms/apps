
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
html,body{margin:0;padding:0;font-family:'Nunito',sans-serif;background:transparent;-webkit-text-size-adjust:100%;}
*{box-sizing:border-box;}

:root{
  --green:#25D366;--dgreen:#128C7E;--xgreen:#075E54;
  --bubble:#fff;--sbubble:#DCF8C6;
  --praise:#E8F5E9;--wrong:#FFEBEE;--idk:#FFF8E1;--info:#E3F2FD;
  --text:#111;--muted:#666;--bg:#ECE5DD;
}

.app{
  width:100%;max-width:420px;margin:0 auto;
  background:var(--bg);
  min-height:600px;display:flex;flex-direction:column;
  border-radius:16px;overflow:hidden;
  box-shadow:0 4px 24px rgba(0,0,0,0.15);
}

/* HEADER */
.hdr{
  background:var(--xgreen);
  padding:10px 14px;
  display:flex;align-items:center;gap:10px;
  flex-shrink:0;
}
.hav{
  width:38px;height:38px;border-radius:50%;
  background:var(--dgreen);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;
}
.hinfo{flex:1;min-width:0;}
.hname{color:#fff;font-size:14px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hsub{color:#B2DFDB;font-size:11px;} 
.hbadge{background:var(--dgreen);color:#fff;font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0;}

/* PROGRESS */
.prog{background:var(--dgreen);padding:4px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.ptrack{flex:1;height:4px;background:rgba(255,255,255,0.25);border-radius:2px;overflow:hidden;}
.pfill{height:100%;background:var(--green);border-radius:2px;transition:width 0.5s;}
.plbl{color:#fff;font-size:10px;font-weight:700;white-space:nowrap;}

/* CHAT AREA */
.chat{
  flex:1;overflow-y:auto;
  padding:10px 8px 6px;
  display:flex;flex-direction:column;gap:6px;
  background:var(--bg);
  background-image:url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23c5b8ae' fill-opacity='0.15'%3E%3Cpath d='M0 0h4v4H0zm8 0h4v4H8zm8 0h4v4h-4zM0 8h4v4H0zm8 8h4v4H8z'/%3E%3C/g%3E%3C/svg%3E");
  min-height:320px;
  max-height:420px;
}
.chip{text-align:center;margin:4px 0;}
.chip span{background:rgba(255,255,255,0.85);color:#555;font-size:10px;padding:3px 10px;border-radius:8px;font-weight:700;}
.lchip span{background:var(--xgreen);color:#fff;font-size:10px;padding:3px 12px;border-radius:20px;font-weight:700;}

/* MESSAGES */
.mr{display:flex;margin:1px 0;animation:pop .25s cubic-bezier(.175,.885,.32,1.275);}
@keyframes pop{from{opacity:0;transform:scale(.85) translateY(8px);}to{opacity:1;transform:scale(1) translateY(0);}}
.mr.t{justify-content:flex-start;}
.mr.s{justify-content:flex-end;}

.bub{
  max-width:82%;padding:8px 10px 4px;border-radius:10px;
  font-size:13px;line-height:1.55;position:relative;word-break:break-word;
}
.bub.t{background:var(--bubble);color:var(--text);border-top-left-radius:2px;box-shadow:0 1px 2px rgba(0,0,0,0.08);}
.bub.t::before{content:'';position:absolute;top:0;left:-6px;border:6px solid transparent;border-top-color:var(--bubble);border-left:0;}
.bub.s{background:var(--sbubble);color:var(--text);border-top-right-radius:2px;box-shadow:0 1px 2px rgba(0,0,0,0.08);}
.bub.s::after{content:'';position:absolute;top:0;right:-6px;border:6px solid transparent;border-top-color:var(--sbubble);border-right:0;}
.bub.praise{background:var(--praise);} .bub.praise::before{border-top-color:var(--praise);}
.bub.wrong2{background:var(--wrong);} .bub.wrong2::before{border-top-color:var(--wrong);}
.bub.idk2{background:var(--idk);} .bub.idk2::before{border-top-color:var(--idk);}
.bub.info2{background:var(--info);} .bub.info2::before{border-top-color:var(--info);}

.btext{font-size:13px;line-height:1.6;margin-bottom:3px;}
.btext strong{color:var(--xgreen);}
.btext .od{color:var(--muted);font-size:12px;display:block;margin-top:3px;padding-top:3px;border-top:0.5px solid rgba(0,0,0,0.07);}
.btime{font-size:10px;color:#aaa;text-align:right;margin-top:2px;display:flex;justify-content:flex-end;align-items:center;gap:2px;}
.tick{color:#53BDEB;}

/* VOICE ROW inside bubble */
.vrow{display:flex;align-items:center;gap:7px;padding:4px 0;margin-top:4px;}
.vbtn{width:32px;height:32px;border-radius:50%;background:var(--green);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;transition:transform .15s,background .15s;}
.vbtn:active{transform:scale(.9);}
.vbtn.on{background:var(--dgreen);}
.vcanvas{flex:1;height:24px;display:block;}
.vdur{font-size:10px;color:var(--muted);min-width:26px;text-align:right;}

/* TYPING */
.typr{display:flex;align-items:flex-end;margin:2px 0;}
.typdots{background:#fff;border-radius:10px;border-top-left-radius:2px;padding:8px 12px;box-shadow:0 1px 2px rgba(0,0,0,0.08);display:flex;gap:3px;align-items:center;}
.typdots span{width:6px;height:6px;border-radius:50%;background:#bbb;animation:td 1.2s infinite;display:block;}
.typdots span:nth-child(2){animation-delay:.2s;}
.typdots span:nth-child(3){animation-delay:.4s;}
@keyframes td{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-4px);}}

/* OPTIONS PANEL */
.opanel{
  background:#F0F2F5;border-top:0.5px solid #ddd;
  padding:8px 10px;display:flex;flex-direction:column;gap:6px;
  flex-shrink:0;min-height:54px;
}
.obtn{
  width:100%;background:#fff;border:1.5px solid #ddd;
  border-radius:12px;padding:9px 14px;
  font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;
  color:#333;cursor:pointer;display:flex;align-items:center;gap:8px;
  text-align:left;transition:all .15s;-webkit-tap-highlight-color:transparent;
}
.obtn:active{transform:scale(.97);}
.obtn .on{width:26px;height:26px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;}
.obtn .ot{flex:1;}
.obtn .os{font-size:11px;color:#999;font-weight:400;display:block;margin-top:1px;}
.obtn.ga{background:#E8F5E9;border-color:#66BB6A;} .obtn.ga .on{background:#43A047;}
.obtn.gb{background:#FFEBEE;border-color:#EF9A9A;} .obtn.gb .on{background:#EF5350;}
.obtn.gc{background:#FFF8E1;border-color:#FFD54F;} .obtn.gc .on{background:#FFA726;}
.obtn.g1 .on{background:#1976D2;} .obtn.g2 .on{background:#7B1FA2;} .obtn.g3 .on{background:#E64A19;}
.obtn.disabled{pointer-events:none;opacity:.5;}

/* FILL IN BLANK */
.fibbox{
  background:#fff;border-radius:12px;border:1.5px solid var(--green);
  padding:10px 12px;display:flex;flex-direction:column;gap:7px;
}
.fibq{font-size:13px;color:#333;font-weight:600;line-height:1.6;}
.fibq span{background:#FFF9C4;border-bottom:2px solid #FBC02D;padding:0 3px;color:#888;font-style:italic;}
.fibhint{font-size:11px;color:#888;text-align:center;}
.fibrow{display:flex;gap:7px;}
.fibinp{
  flex:1;border:1.5px solid #ccc;border-radius:8px;
  padding:8px 10px;font-family:'Nunito',sans-serif;font-size:14px;
  font-weight:700;color:#333;outline:none;
  -webkit-appearance:none;appearance:none;
}
.fibinp:focus{border-color:var(--green);}
.fibinp.ok{border-color:#43A047;background:#E8F5E9;color:#2E7D32;}
.fibinp.bad{border-color:#EF5350;background:#FFEBEE;color:#C62828;}
.fibsub{
  background:var(--green);color:#fff;border:none;border-radius:8px;
  padding:8px 12px;font-family:'Nunito',sans-serif;font-size:13px;
  font-weight:800;cursor:pointer;flex-shrink:0;
  -webkit-tap-highlight-color:transparent;
}
.fibsub:active{background:var(--dgreen);}
</style>

  <div class="hdr">

    </div>

<script>
const C=document.getElementById('chat'),OP=document.getElementById('op'),PF=document.getElementById('pf'),PS=document.getElementById('ps'),HB=document.getElementById('hb'),HS=document.getElementById('hs');
const D=ms=>new Promise(r=>setTimeout(r,ms));

/* CLOCK */
function clk(){const d=new Date();return d.getHours()+':'+String(d.getMinutes()).padStart(2,'0');}

/* SPEAK */
function speak(txt,cb){
  if(!window.speechSynthesis){if(cb)cb();return;}
  window.speechSynthesis.cancel();
  const vv=window.speechSynthesis.getVoices()||[];
  const v=vv.find(x=>(x.name.includes('Samantha')||x.name.includes('Karen')||x.name.includes('Victoria')||x.name.includes('Zira'))&&x.lang.startsWith('en'))
    ||vv.find(x=>x.lang.startsWith('en-'))||vv[0];
  const u=new SpeechSynthesisUtterance(txt);
  if(v)u.voice=v;u.rate=.87;u.pitch=1.1;u.volume=1;
  u.onend=u.onerror=()=>{HS.textContent='online';if(cb)cb();};
  HS.textContent='speaking...';
  window.speechSynthesis.speak(u);
}

/* WAVE */
function wdraw(cv,on){
  const W=cv.width=cv.clientWidth||120,H=cv.height=24;
  const ctx=cv.getContext('2d');ctx.clearRect(0,0,W,H);
  for(let i=0;i<20;i++){
    const h=on?3+Math.abs(Math.sin(i*.7+Date.now()*.009))*14:2+Math.abs(Math.sin(i*.9))*7;
    ctx.fillStyle=on?'#25D366':'#BDBDBD';
    const x=i*5.8,y=(H-h)/2;
    ctx.beginPath();
    if(ctx.roundRect)ctx.roundRect(x,y,3,h,1.5);else ctx.rect(x,y,3,h);
    ctx.fill();
  }
}
function wanim(cv,btn,s){
  const t0=Date.now();
  (function f(){
    if(!btn.classList.contains('on')||(Date.now()-t0)/1000>=s){wdraw(cv,false);return;}
    wdraw(cv,true);requestAnimationFrame(f);
  })();
}

/* ADD TEACHER MESSAGE (text + voice) */
function addT(html,speech,cls=''){
  const row=document.createElement('div');row.className='mr t';
  const b=document.createElement('div');b.className='bub t '+(cls||'');

  const tx=document.createElement('div');tx.className='btext';tx.innerHTML=html;

  const vr=document.createElement('div');vr.className='vrow';
  const btn=document.createElement('button');btn.className='vbtn';btn.textContent='▶';
  const cv=document.createElement('canvas');cv.className='vcanvas';
  const dur=document.createElement('span');dur.className='vdur';
  const secs=Math.max(2,Math.round(speech.split(' ').length/2));
  dur.textContent='0:'+String(secs).padStart(2,'0');
  vr.append(btn,cv,dur);

  const tm=document.createElement('div');tm.className='btime';tm.textContent=clk();

  b.append(tx,vr,tm);row.appendChild(b);C.appendChild(row);
  C.scrollTop=99999;
  setTimeout(()=>wdraw(cv,false),80);

  btn.onclick=()=>{
    if(btn.classList.contains('on')){
      window.speechSynthesis&&window.speechSynthesis.cancel();
      btn.classList.remove('on');btn.textContent='▶';wdraw(cv,false);
    } else {
      btn.classList.add('on');btn.textContent='⏸';
      wanim(cv,btn,secs);
      speak(speech,()=>{btn.classList.remove('on');btn.textContent='▶';wdraw(cv,false);});
    }
  };
  return{btn,cv,secs};
}

/* STUDENT BUBBLE */
function addS(txt,write=false){
  const row=document.createElement('div');row.className='mr s';
  const b=document.createElement('div');b.className='bub s'+(write?' info2':'');
  b.innerHTML=txt;
  const tm=document.createElement('div');tm.className='btime';
  tm.innerHTML=clk()+' <span class="tick">✓✓</span>';
  b.appendChild(tm);row.appendChild(b);C.appendChild(row);C.scrollTop=99999;
}

/* CHIPS */
function chip(t,lesson=false){
  const d=document.createElement('div');d.className='chip'+(lesson?' lchip':'');
  d.innerHTML='<span>'+t+'</span>';C.appendChild(d);C.scrollTop=99999;
}

/* TYPING */
function showT(){
  const r=document.createElement('div');r.className='typr';r.id='typ';
  const d=document.createElement('div');d.className='typdots';
  d.innerHTML='<span></span><span></span><span></span>';
  r.appendChild(d);C.appendChild(r);C.scrollTop=99999;HS.textContent='typing...';
}
function hideT(){const t=document.getElementById('typ');if(t)t.remove();HS.textContent='online';}

/* TEACHER SAY auto-play */
async function say(html,speech,cls='',wait=500){
  await D(wait);showT();await D(650);hideT();
  const{btn,cv,secs}=addT(html,speech,cls);
  btn.classList.add('on');btn.textContent='⏸';wanim(cv,btn,secs);
  return new Promise(r=>speak(speech,()=>{btn.classList.remove('on');btn.textContent='▶';wdraw(cv,false);r();}));
}

/* OPTIONS */
function opts(arr){
  OP.innerHTML='';
  arr.forEach((o,i)=>{
    const b=document.createElement('button');b.className='obtn '+(o.c||'');
    b.innerHTML=`<div class="on">${i+1}</div><div class="ot">${o.t}<span class="os">${o.s||''}</span></div>`;
    b.onclick=()=>{document.querySelectorAll('.obtn').forEach(x=>x.classList.add('disabled'));o.fn(b);};
    OP.appendChild(b);
  });
}
function clrOpts(){OP.innerHTML='';}

/* FILL IN BLANK */
function fib(qhtml,hint,answers,onOk,onBad){
  OP.innerHTML='';
  const box=document.createElement('div');box.className='fibbox';
  const q=document.createElement('div');q.className='fibq';q.innerHTML=qhtml;
  const h=document.createElement('div');h.className='fibhint';h.textContent=hint;
  const row=document.createElement('div');row.className='fibrow';
  const inp=document.createElement('input');inp.className='fibinp';
  inp.placeholder='ଏଠି ଲେଖ...';inp.autocomplete='off';inp.autocorrect='off';
  inp.autocapitalize='off';inp.spellcheck=false;inp.type='text';
  const sub=document.createElement('button');sub.className='fibsub';sub.textContent='OK ➤';
  row.append(inp,sub);box.append(q,h,row);OP.appendChild(box);
  inp.focus();
  function chk(){
    const v=inp.value.trim().toLowerCase().replace(/\s+/g,' ');
    if(!v)return;
    inp.disabled=true;sub.disabled=true;
    const ok=answers.some(a=>a.toLowerCase()===v||a.toLowerCase()===v.replace(/\s/g,''));
    if(ok){inp.classList.add('ok');addS('✍️ '+inp.value.trim(),true);setTimeout(()=>{clrOpts();onOk();},500);}
    else{inp.classList.add('bad');setTimeout(()=>{clrOpts();onBad(inp.value.trim());},500);}
  }
  sub.onclick=chk;inp.onkeydown=e=>{if(e.key==='Enter')chk();};
}

/* PROGRESS */
function upd(n){
  PF.style.width=(n/4*100)+'%';PS.textContent=Math.round(n/4*100)+'%';HB.textContent='Lesson '+n+'/4';
}

  cspeech:'Quick check! What does wake up mean? Option 1: to go to sleep. Option 2: to get up from sleep. Option 3: I do not know.',

async function runEX(exqs,done){
  for(let i=0;i<exqs.length;i++){
    const q=exqs[i];
    await say(q.html,q.speech,'',400);
    await D(200);
    await new Promise(res=>{
      opts(q.opts.map((o,idx)=>({
        t:o.t,s:o.s,
        c:'g'+(idx+1),
        fn:async()=>{
          addS(o.t+' 👆');clrOpts();
          if(o.type==='c') await say(q.okh,q.oks,'praise',400);
          else if(o.type==='w') await say(q.wh,q.ws,'wrong2',400);
          else await say(q.ih,q.is,'idk2',400);
          await D(300);
          if(i<exqs.length-1) opts([{t:'Next →',s:'',c:'ga',fn:()=>{clrOpts();res();}}]);
          else res();
        }
      })));
    });
  }
  await D(200);done();
}

  await say('🎯 <strong>3 ଟି Example Questions!</strong><br><span class="od">Let me test your understanding!</span>','Great! Now 3 example questions. Are you ready?','',400);

  else endAll();
}
