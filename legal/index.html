<!DOCTYPE html>
<html lang="or">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WAKE UP — Day 1 | Teacher Priya</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;font-family:'Nunito',sans-serif;-webkit-text-size-adjust:100%;}

.app{
  width:100%;max-width:430px;margin:0 auto;
  height:100dvh;height:100vh;
  display:flex;flex-direction:column;
  background:#ece5dd;
  background-image:url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23c5b8ae' fill-opacity='0.13'%3E%3Cpath d='M0 0h4v4H0zm8 0h4v4H8zm8 0h4v4h-4zM0 8h4v4H0zm8 8h4v4H8z'/%3E%3C/g%3E%3C/svg%3E");
  overflow:hidden;
  position:relative;
}

/* HEADER */
.hdr{background:#075E54;padding:9px 12px;display:flex;align-items:center;gap:9px;flex-shrink:0;z-index:10;}
.hav{width:38px;height:38px;border-radius:50%;background:#128C7E;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.hinfo{flex:1;}
.hname{color:#fff;font-size:14px;font-weight:800;}
.hsub{color:#b2dfdb;font-size:10px;}
.hbadge{background:rgba(255,255,255,0.15);color:#fff;font-size:10px;font-weight:700;padding:3px 9px;border-radius:12px;flex-shrink:0;}

/* PROGRESS */
.prog{background:#128C7E;padding:3px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.ptrack{flex:1;height:3px;background:rgba(255,255,255,0.25);border-radius:2px;overflow:hidden;}
.pfill{height:100%;background:#25D366;border-radius:2px;transition:width 0.6s;}
.plbl{color:#fff;font-size:9px;font-weight:700;white-space:nowrap;}

/* CHAT — sole scroll container */
.chat{
  flex:1;
  overflow-y:scroll;
  -webkit-overflow-scrolling:touch;
  padding:10px 8px 30px;
  display:flex;flex-direction:column;gap:7px;
}

/* anchor div at the bottom — we scroll this into view */
.anchor{height:1px;flex-shrink:0;}

/* CHIP */
.chip{text-align:center;margin:2px 0;flex-shrink:0;}
.chip span{background:rgba(255,255,255,0.82);color:#555;font-size:10px;padding:3px 10px;border-radius:8px;font-weight:700;}
.lchip span{background:#075E54;color:#fff;border-radius:12px;}

/* BUBBLES */
.mr{display:flex;flex-shrink:0;animation:pop .2s cubic-bezier(.175,.885,.32,1.275) both;}
@keyframes pop{from{opacity:0;transform:scale(.88) translateY(5px);}to{opacity:1;transform:scale(1) translateY(0);}}
.mr.t{justify-content:flex-start;}
.mr.s{justify-content:flex-end;}

.bub{
  max-width:88%;padding:9px 12px 5px;border-radius:10px;
  position:relative;word-break:break-word;
  text-align:justify;
}
.bub.t{background:#fff;border-top-left-radius:2px;box-shadow:0 1px 2px rgba(0,0,0,0.1);}
.bub.t::before{content:'';position:absolute;top:0;left:-5px;border:5px solid transparent;border-top-color:#fff;border-left:0;}
.bub.s{background:#DCF8C6;border-top-right-radius:2px;box-shadow:0 1px 2px rgba(0,0,0,0.1);}
.bub.s::after{content:'';position:absolute;top:0;right:-5px;border:5px solid transparent;border-top-color:#DCF8C6;border-right:0;}
.bub.praise{background:#d4edda;}.bub.praise::before{border-top-color:#d4edda;}
.bub.wrong2{background:#fce4ec;}.bub.wrong2::before{border-top-color:#fce4ec;}
.bub.idk2{background:#fffde7;}.bub.idk2::before{border-top-color:#fffde7;}
.bub.info2{background:#e3f2fd;}.bub.info2::before{border-top-color:#e3f2fd;}

.btext{
  font-size:14px;line-height:1.7;
  color:#000;font-weight:800;
  display:block;text-align:justify;
}
.btime{font-size:10px;color:#bbb;text-align:right;margin-top:4px;display:flex;justify-content:flex-end;align-items:center;gap:2px;}
.tick{color:#53BDEB;}

/* INLINE AUDIO BUTTON */
.abtn{
  display:inline-flex;align-items:center;justify-content:center;
  width:22px;height:22px;border-radius:50%;
  background:#25D366;border:none;cursor:pointer;
  font-size:10px;color:#fff;vertical-align:middle;
  margin-left:5px;transition:background .12s,transform .1s;
  position:relative;top:-1px;
}
.abtn:active{transform:scale(.85);}
.abtn.on{background:#128C7E;}
.abtn.on::after{content:'';position:absolute;width:30px;height:30px;border-radius:50%;border:2px solid #128C7E;animation:ring 1s infinite;}
@keyframes ring{0%{transform:scale(.7);opacity:.8;}100%{transform:scale(1.5);opacity:0;}}

/* TYPING INDICATOR */
.typr{display:flex;flex-shrink:0;}
.tdots{background:#fff;border-radius:10px;border-top-left-radius:2px;padding:8px 13px;box-shadow:0 1px 2px rgba(0,0,0,0.09);display:flex;gap:4px;align-items:center;}
.tdots span{width:6px;height:6px;border-radius:50%;background:#ccc;animation:td 1.1s infinite;display:block;}
.tdots span:nth-child(2){animation-delay:.18s;}
.tdots span:nth-child(3){animation-delay:.36s;}
@keyframes td{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-5px);}}

/* OPTION BLOCK */
.optblock{display:flex;flex-direction:column;gap:5px;flex-shrink:0;animation:pop .2s both;}
.obtn{
  background:#fff;border:1.5px solid #ddd;border-radius:10px;
  padding:10px 12px;
  font-family:'Nunito',sans-serif;font-size:13.5px;font-weight:800;
  color:#000;cursor:pointer;display:flex;align-items:center;gap:9px;
  text-align:left;width:100%;line-height:1.4;
  transition:transform .1s,background .1s;
}
.obtn:active{transform:scale(.97);}
.obtn .onum{width:26px;height:26px;min-width:26px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;flex-shrink:0;}
.obtn.g1 .onum{background:#1565c0;}
.obtn.g2 .onum{background:#6a1b9a;}
.obtn.g3 .onum{background:#bf360c;}
.obtn.g4 .onum{background:#00695c;}
.obtn.disabled{pointer-events:none;opacity:.35;}
.obtn.sel-c{background:#e8f5e9;border-color:#66bb6a;pointer-events:none;}
.obtn.sel-c .onum{background:#2e7d32;}
.obtn.sel-w{background:#ffebee;border-color:#ef9a9a;pointer-events:none;}
.obtn.sel-w .onum{background:#c62828;}

/* NEXT BUTTON */
.nxtbtn{
  align-self:flex-end;flex-shrink:0;
  background:#25D366;color:#fff;border:none;
  border-radius:20px;padding:9px 22px;
  font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;
  cursor:pointer;animation:pop .2s both;
}
.nxtbtn:active{background:#128C7E;transform:scale(.96);}

/* FILL IN BLANK */
.fibblock{
  background:#fff;border-radius:10px;border:1.5px solid #25D366;
  padding:11px 12px;display:flex;flex-direction:column;gap:7px;
  flex-shrink:0;animation:pop .2s both;
}
.fibq{font-size:13.5px;color:#000;font-weight:800;line-height:1.65;text-align:justify;}
.fibhint{font-size:11px;color:#aaa;text-align:center;}
.fibrow{display:flex;gap:6px;}
.fibinp{
  flex:1;border:1.5px solid #ddd;border-radius:8px;
  padding:9px 10px;font-family:'Nunito',sans-serif;
  font-size:14px;font-weight:800;color:#000;outline:none;
  -webkit-appearance:none;
}
.fibinp:focus{border-color:#25D366;}
.fibinp.ok{border-color:#43a047;background:#e8f5e9;color:#2e7d32;}
.fibinp.bad{border-color:#e53935;background:#ffebee;color:#b71c1c;}
.fibsub{
  background:#25D366;color:#fff;border:none;border-radius:8px;
  padding:9px 14px;font-family:'Nunito',sans-serif;
  font-size:13px;font-weight:800;cursor:pointer;flex-shrink:0;
}
.fibsub:active{background:#128C7E;}

/* CURSOR BLINK */
.cur{display:inline-block;width:2px;height:1em;background:#000;vertical-align:text-bottom;animation:blink .65s step-end infinite;margin-left:1px;}
@keyframes blink{50%{opacity:0;}}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="hav">👩‍🏫</div>
    <div class="hinfo">
      <div class="hname">Teacher Priya</div>
      <div class="hsub" id="hs">online</div>
    </div>
    <div class="hbadge" id="hb">Day 1</div>
  </div>
  <div class="prog">
    <span class="plbl">🌅 WAKE UP</span>
    <div class="ptrack"><div class="pfill" id="pf" style="width:0%"></div></div>
    <span class="plbl" id="ps">0%</span>
  </div>
  <div class="chat" id="chat">
    <div class="anchor" id="anchor"></div>
  </div>
</div>
<script>
// ─── CORE REFS ───────────────────────────────────────────────
const C   = document.getElementById('chat');
const ANC = document.getElementById('anchor');
const PF  = document.getElementById('pf');
const PS  = document.getElementById('ps');
const HB  = document.getElementById('hb');
const HS  = document.getElementById('hs');

const D = ms => new Promise(r => setTimeout(r, ms));
function clk(){const d=new Date();return d.getHours()+':'+String(d.getMinutes()).padStart(2,'0');}

// ─── SCROLL: insert element BEFORE anchor, then scroll anchor into view ───
// The anchor sits at the very end. We move new elements before it
// so the anchor stays at the bottom. Then we scroll the NEW element's
// top to the top of the chat container using scrollTop arithmetic.
function insert(el){
  C.insertBefore(el, ANC);   // put element just before anchor
}
function scrollToEl(el){
  // Wait for paint, then set scrollTop so el.top = chat.top + 8px gap
  requestAnimationFrame(()=>{
    const chatRect = C.getBoundingClientRect();
    const elRect   = el.getBoundingClientRect();
    const delta    = elRect.top - chatRect.top - 8;
    C.scrollTop   += delta;
  });
}

// ─── AUDIO (MP3) ─────────────────────────────────────────────
const AUDIO_URL = 'https://audio-engine.happysangitanms.workers.dev/day1-class-1.mp3';
let currentAudio = null;

function playAudio(cb){
  stopAudio();
  const a = new Audio(AUDIO_URL);
  currentAudio = a;
  HS.textContent = 'ଶୁଣୁଛ...';
  a.onended = a.onerror = ()=>{ currentAudio=null; HS.textContent='online'; if(cb)cb(); };
  a.play().catch(()=>{ currentAudio=null; HS.textContent='online'; if(cb)cb(); });
}
function stopAudio(){
  if(currentAudio){ currentAudio.pause(); currentAudio=null; }
  HS.textContent='online';
}

// ─── TEACHER BUBBLE ─────────────────────────────────────────
function typeText(el, text, speed=24){
  return new Promise(res=>{
    el.innerHTML='';
    const cur = document.createElement('span'); cur.className='cur'; el.appendChild(cur);
    let i=0;
    function step(){
      if(i>=text.length){ cur.remove(); res(); return; }
      const ch = text[i++];
      cur.insertAdjacentText('beforebegin', ch);
      const delay = ch==='।'||ch==='.'||ch==='!'||ch==='?' ? speed*6 : ch===','?speed*2.5 : speed;
      setTimeout(step, delay);
    }
    step();
  });
}

async function addT(text, cls=''){
  // build row
  const row = document.createElement('div'); row.className='mr t';
  const bub = document.createElement('div'); bub.className='bub t '+(cls||'');
  const tx  = document.createElement('span'); tx.className='btext';
  const tm  = document.createElement('div'); tm.className='btime'; tm.textContent=clk();
  bub.append(tx, tm);
  row.appendChild(bub);

  // audio button (added after typing)
  const abtn = document.createElement('button'); abtn.className='abtn'; abtn.innerHTML='🔊';
  abtn.onclick=()=>{
    if(abtn.classList.contains('on')){ stopAudio(); abtn.classList.remove('on'); abtn.innerHTML='🔊'; return; }
    document.querySelectorAll('.abtn.on').forEach(x=>{ x.classList.remove('on'); x.innerHTML='🔊'; });
    abtn.classList.add('on'); abtn.innerHTML='⏸';
    playAudio(()=>{ abtn.classList.remove('on'); abtn.innerHTML='🔊'; });
  };

  insert(row);
  scrollToEl(row);   // scroll new bubble to top of chat

  await typeText(tx, text, 24);
  tx.appendChild(abtn);   // append audio button inline after text

  // autoplay
  abtn.classList.add('on'); abtn.innerHTML='⏸';
  await new Promise(r=> playAudio(()=>{ abtn.classList.remove('on'); abtn.innerHTML='🔊'; r(); }));
}

// ─── STUDENT BUBBLE ─────────────────────────────────────────
function addS(text){
  const row = document.createElement('div'); row.className='mr s';
  const bub = document.createElement('div'); bub.className='bub s';
  bub.textContent = text;
  const tm = document.createElement('div'); tm.className='btime';
  tm.innerHTML = clk()+' <span class="tick">✓✓</span>';
  bub.appendChild(tm); row.appendChild(bub);
  insert(row);
  scrollToEl(row);
}

// ─── CHIP ───────────────────────────────────────────────────
function chip(t, lesson=false){
  const d = document.createElement('div'); d.className='chip'+(lesson?' lchip':'');
  d.innerHTML='<span>'+t+'</span>';
  insert(d);
  scrollToEl(d);
}

// ─── TYPING INDICATOR ───────────────────────────────────────
let typingEl = null;
function showTyping(){
  typingEl = document.createElement('div'); typingEl.className='typr';
  typingEl.innerHTML='<div class="tdots"><span></span><span></span><span></span></div>';
  insert(typingEl);
  scrollToEl(typingEl);
  HS.textContent='ଟାଇପ୍ କରୁଛ...';
}
function hideTyping(){
  if(typingEl&&typingEl.parentNode) typingEl.parentNode.removeChild(typingEl);
  typingEl=null; HS.textContent='online';
}

// ─── SAY ────────────────────────────────────────────────────
async function say(text, cls='', wait=350){
  await D(wait); showTyping(); await D(600); hideTyping();
  await addT(text, cls);
}

// ─── OPTIONS ────────────────────────────────────────────────
function showOpts(arr){
  return new Promise(res=>{
    const block = document.createElement('div'); block.className='optblock';
    arr.forEach((o,i)=>{
      const b = document.createElement('button'); b.className='obtn g'+(i+1);
      b.innerHTML=`<div class="onum">${i+1}</div><div style="flex:1">${o.t}</div>`;
      b.onclick=()=>{
        block.querySelectorAll('.obtn').forEach(x=>x.classList.add('disabled'));
        b.classList.remove('disabled');
        b.classList.add(o.c ? 'sel-c' : 'sel-w');
        setTimeout(()=>res({opt:o, block}), 300);
      };
      block.appendChild(b);
    });
    insert(block);
    scrollToEl(block);
  });
}
function removeEl(el){ if(el&&el.parentNode) el.parentNode.removeChild(el); }

// ─── NEXT BUTTON ────────────────────────────────────────────
function showNext(label='ଆଗକୁ ▶'){
  return new Promise(res=>{
    const btn = document.createElement('button'); btn.className='nxtbtn'; btn.textContent=label;
    btn.onclick=()=>{ removeEl(btn); res(); };
    insert(btn);
    scrollToEl(btn);
  });
}

// ─── FILL IN BLANK ──────────────────────────────────────────
function showFib(qtext, hint, answers){
  return new Promise(res=>{
    const block = document.createElement('div'); block.className='fibblock';
    const q   = document.createElement('div'); q.className='fibq'; q.textContent=qtext;
    const h   = document.createElement('div'); h.className='fibhint'; h.textContent=hint;
    const row = document.createElement('div'); row.className='fibrow';
    const inp = document.createElement('input'); inp.className='fibinp';
    inp.placeholder='ଏଠି ଲେଖ...'; inp.autocomplete='off'; inp.autocorrect='off';
    inp.autocapitalize='off'; inp.spellcheck=false; inp.type='text';
    const sub = document.createElement('button'); sub.className='fibsub'; sub.textContent='OK ➤';
    row.append(inp, sub); block.append(q, h, row);
    insert(block);
    scrollToEl(block);
    setTimeout(()=>{ inp.focus(); scrollToEl(block); }, 400);
    inp.addEventListener('focus', ()=>setTimeout(()=>scrollToEl(block), 350));
    function chk(){
      const v = inp.value.trim().toLowerCase().replace(/\s+/g,' ');
      if(!v) return;
      inp.disabled=true; sub.disabled=true;
      const ok = answers.some(a=>a.toLowerCase()===v || a.toLowerCase()===v.replace(/\s/g,''));
      inp.classList.add(ok?'ok':'bad');
      setTimeout(()=>{ removeEl(block); res({ok, val:inp.value.trim()}); }, 400);
    }
    sub.onclick=chk; inp.onkeydown=e=>{ if(e.key==='Enter'){e.preventDefault();chk();} };
  });
}

// ─── PROGRESS ───────────────────────────────────────────────
function upd(n){ PF.style.width=(n/4*100)+'%'; PS.textContent=Math.round(n/4*100)+'%'; HB.textContent='Lesson '+n+'/4'; }

// ════════════════════════════════════════════════════════════
// LESSON DATA — Odia only
// ════════════════════════════════════════════════════════════
const LS=[
{
  chip:'📖 ପାଠ ୧ — WAKE UP ର ଅର୍ଥ',
  tt:'ସକାଳୁ ନିଦରରୁ ଉଠିବାକୁ WAKE UP କହନ୍ତି। ଚାଷୀ ୫ ଟାରେ WAKE UP ହୁଅନ୍ତି। ମୁଁ ପ୍ରତ୍ୟେକ ଦିନ WAKE UP ହୁଏ। ପିଲା ଦେରିରେ WAKE UP ହୁଏ।',
  ut:'ତୁମେ ବୁଝିଲ? WAKE UP = ନିଦରରୁ ଉଠିବା।',
  ct:'✏️ ଶୀଘ୍ର ଯାଞ୍ଚ — WAKE UP ର ଅର୍ଥ କ\'ଣ?',
  copts:[
    {t:'ଘୁମ ଯିବା',c:false},
    {t:'ନିଦରରୁ ଉଠିବା ✅',c:true},
    {t:'ଦୌଡ଼ିବା',c:false},
    {t:'ଜାଣ ନାହିଁ',c:false,idk:true}
  ],

  not:'❌ WAKE UP = ନିଦରରୁ ଉଠିବା। ଆଉ ଥରେ ଶୁଣ।',
  idt:'💛 WAKE UP = ନିଦରରୁ ଉଠିବା। ସକାଳୁ ଆଖି ଖୋଲିବା = WAKE UP!',
  ft:'✍️ ବନାନ — ନିଦରରୁ ଉଠିବାକୁ ଇଂରାଜୀରେ ଲେଖ। (_ _ _ _   _ _)',
  fa:['wake up','wakeup','wakes up'],fh:'ସୂଚନା: W _ _ _   U _ (୨ ଟି ଶବ୍ଦ)',
  fot:'✅ WAKE UP — ବନାନ ସଂପୂର୍ଣ୍ଣ ଠିକ! 🌟',
  fnt:'✏️ ଠିକ ବନାନ: WAKE UP — W-A-K-E  U-P',

     opts:[{t:'The farmer wakes up at 5 ✅',c:true},{t:'The farmer sleeps at 5',c:false},{t:'The farmer runs at 5',c:false},{t:'ଜାଣ ନାହିଁ',c:false,idk:true}],
     okt:'🌟 The farmer wakes up at 5 ✅ — ଶାବାସ!',
     wt:'❌ ଠିକ: The farmer wakes up at 5',
     it:'💛 ଉତ୍ତର: The farmer wakes up at 5'},
    {t:'❓ ପ୍ର ୨/୩ — "ମୋ ମା ସକାଳୁ ନିଦରରୁ ଉଠ" — ଠିକ ବାକ୍ୟ?',
     opts:[{t:'My mother wakes up early ✅',c:true},{t:'My mother goes to sleep early',c:false},{t:'My mother eats early',c:false},{t:'ଜାଣ ନାହିଁ',c:false,idk:true}],
     okt:'🌟 My mother wakes up early ✅ — ଚମତ୍କାର!',
     wt:'❌ ଠିକ: My mother wakes up early',

    {t:'❓ ପ୍ର ୩/୩ — "ପିଲା ଦୈନିକ ଦେରିରେ ନିଦରରୁ ଉଠ" — ଠିକ ବାକ୍ୟ?',
     opts:[{t:'The child wakes up late daily ✅',c:true},{t:'The child sleeps late daily',c:false},{t:'The child runs late daily',c:false},{t:'ଜାଣ ନାହିଁ',c:false,idk:true}],
     okt:'🌟 ପାଠ ୧ ସଂପୂର୍ଣ୍ଣ! 🎉 The child wakes up late daily ✅',
     wt:'❌ ଠିକ: The child wakes up late daily',
     it:'💛 ଉତ୍ତର: The child wakes up late daily'}
  ]
},

async function runEX(exqs){
  for(let i=0;i<exqs.length;i++){
    const q=exqs[i];
    await say(q.t,'',350);
    const {opt,block}=await showOpts(q.opts);
    await D(150); removeEl(block);
    if(opt.c)       await say(q.okt,'praise',300);
    else if(opt.idk) await say(q.it,'idk2',300);
    else             await say(q.wt,'wrong2',300);
    if(i<exqs.length-1) await showNext('ପରବର୍ତ୍ତୀ ▶');
  }
}

async function runL(idx){
  if(idx>=LS.length){endAll();return;}
  const L=LS[idx]; upd(idx+1);
  chip(L.chip,true);
  await say(L.tt,'info2',400);
  await say(L.ut,'',350);

  // Understood?
  let und=false;
  while(!und){
    const {opt,block}=await showOpts([
      {t:'✅ ହଁ, ବୁଝ ଗଲି!',c:true},
      {t:'❌ ଆଉ ଥରେ ବୁଝାଅ',c:false}
    ]);
    removeEl(block);
    addS(opt.c?'✅ ବୁଝ ଗଲି!':'❌ ଆଉ ଥରେ');
    if(opt.c){ und=true; }
    else{
      await say('ଠିକ ଅଛି! ଆଉ ଥରେ ଶୁଣ।','idk2',300);
      await say(L.tt,'info2',300);
      await say(L.ut,'',300);
    }
  }

  // Quick check
  await say(L.ct,'',350);
  let chk=false;
  while(!chk){
    const {opt,block}=await showOpts(L.copts);
    removeEl(block);
    addS(opt.t.replace(/ ✅.*/,'').replace(/ —.*/,'').trim());
    if(opt.c){
      await say(L.okt,'praise',300);
      await showNext('ଆଗକୁ ▶'); chk=true;
    }else if(opt.idk){
      await say(L.idt,'idk2',300);
      await showNext('ଆଗକୁ ▶'); chk=true;
    }else{
      await say(L.not,'wrong2',300);
      await say(L.tt,'info2',300);
      await say('🔄 ଆଉ ଥରେ ଚେଷ୍ଟା!','',300);
      await say(L.ct,'',300);
    }
  }

  // Fill in blank
  await say(L.ft,'',350);
  const {ok:fok,val}=await showFib(L.ft,L.fh,L.fa);
  addS('✍️ '+val);
  if(fok) await say(L.fot,'praise',300);
  else    await say(L.fnt,'wrong2',300);
  await showNext('ଆଗକୁ ▶');

  // Example Qs
  await say('🎯 ୩ ଟି ଅଭ୍ୟାସ ପ୍ରଶ୍ନ! ପ୍ରସ୍ତୁତ?','',350);
  const {block:rb}=await showOpts([{t:'✅ ହଁ, ପ୍ରଶ୍ନ କର!',c:true}]);
  removeEl(rb); addS('✅ ହଁ, ପ୍ରଶ୍ନ କର!');
  await runEX(L.exqs);

  await D(300);
  if(idx<LS.length-1){
    const {block:nb}=await showOpts([{t:'▶ ପରବର୍ତ୍ତୀ ପାଠ',c:true}]);
    removeEl(nb); runL(idx+1);
  }else{ endAll(); }
}

  upd(4); chip('🎓 ସମସ୍ତ ୪ ପାଠ ସଂପୂର୍ଣ୍ଣ!',true);
  await say('🏆 ଅଭିନନ୍ଦନ ଚ୍ୟାମ୍ପିଅନ! 🎊 ଆଜ ତୁମେ ଶିଖିଲ: WAKE UP = ନିଦରରୁ ଉଠିବା। Subject ପ୍ରଥମ। He/She → WAKES। ଅତିରିକ୍ତ ଶବ୍ଦ ଶେଷ ରେ। ଆଗ କ୍ଲାସ ଦେଖା ହେବ!','praise',400);
  const {block}=await showOpts([{t:'🔄 ଆଉ ଥରେ ଅଭ୍ୟାସ',c:true}]);
  removeEl(block);
  C.innerHTML='<div class="anchor" id="anchor"></div>';
  upd(0); start();
}

  chip('ଆଜ — Day 1');
  await say('🙏 ନମସ୍କାର! ଇଂରାଜୀ କ୍ଲାସ ରେ ସ୍ୱାଗତ! ମୁଁ Teacher Priya। ଆଜ ପାଠ: WAKE UP 🌅। ୪ ଟି ପାଠ। ପ୍ରସ୍ତୁତ?','',500);
  const {opt,block}=await showOpts([
    {t:'✅ ହଁ, ପ୍ରସ୍ତୁତ!',c:true},
    {t:'⏳ ଟିକେ ଅପେକ୍ଷା',c:false}
  ]);
  removeEl(block);
  if(opt.c){
    addS('✅ ହଁ, ପ୍ରସ୍ତୁତ!');
    await say('🚀 ପାଠ ୧ ଆରମ୍ଭ!','praise',300);
    runL(0);
  }else{
    addS('⏳ ଟିକେ ଅପେକ୍ଷା');
    await say('ଠିକ ଅଛି! ମୁଁ ଅପେକ୍ଷା କରୁଛି।','idk2',300);
    const {block:b2}=await showOpts([{t:'✅ ଏବେ ପ୍ରସ୍ତୁତ!',c:true}]);
    removeEl(b2); addS('✅ ଏବେ ପ୍ରସ୍ତୁତ!');
    await say('🚀 ଆରମ୍ଭ ହେଉ!','praise',300);
    runL(0);
  }
}
