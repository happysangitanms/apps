<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Wake Up — Day 1 | Teacher Priya</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;font-family:'Nunito',sans-serif;background:#e8f0fe;-webkit-text-size-adjust:100%;}

:root{
  --gr:#25D366;--dgr:#128C7E;--xgr:#075E54;
  --sbub:#DCF8C6;--tbub:#fff;
  --bg:#ece5dd;--muted:#888;
  --praise:#d4edda;--wrong:#fde;--idk:#fffde7;
}

.app{
  width:100%;max-width:430px;margin:0 auto;
  height:100dvh;height:100vh;
  display:flex;flex-direction:column;
  background:var(--bg);
  position:relative;overflow:hidden;
}

/* HEADER */
.hdr{
  background:var(--xgr);
  padding:8px 12px;
  display:flex;align-items:center;gap:9px;
  flex-shrink:0;z-index:20;
}
.hav{width:36px;height:36px;border-radius:50%;background:var(--dgr);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.hinfo{flex:1;min-width:0;}
.hname{color:#fff;font-size:13px;font-weight:800;}
.hsub{color:#b2dfdb;font-size:10px;}
.hbadge{background:rgba(255,255,255,0.15);color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:12px;flex-shrink:0;}

/* PROGRESS */
.prog{background:var(--dgr);padding:3px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.ptrack{flex:1;height:3px;background:rgba(255,255,255,0.25);border-radius:2px;overflow:hidden;}
.pfill{height:100%;background:var(--gr);border-radius:2px;transition:width 0.6s ease;}
.plbl{color:#fff;font-size:9px;font-weight:700;white-space:nowrap;}

/* CHAT */
.chat{
  flex:1;overflow-y:auto;
  padding:10px 8px 8px;
  display:flex;flex-direction:column;gap:5px;
  background:var(--bg);
  background-image:url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23c5b8ae' fill-opacity='0.13'%3E%3Cpath d='M0 0h4v4H0zm8 0h4v4H8zm8 0h4v4h-4zM0 8h4v4H0zm8 8h4v4H8z'/%3E%3C/g%3E%3C/svg%3E");
  -webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;
}

.chip{text-align:center;margin:3px 0;flex-shrink:0;}
.chip span{background:rgba(255,255,255,0.8);color:#666;font-size:10px;padding:2px 10px;border-radius:8px;font-weight:700;}
.lchip span{background:var(--xgr);color:#fff;padding:3px 12px;border-radius:12px;}

/* MESSAGE ROWS */
.mr{display:flex;margin:1px 0;animation:pop .22s cubic-bezier(.175,.885,.32,1.275) both;}
@keyframes pop{from{opacity:0;transform:scale(.88) translateY(6px);}to{opacity:1;transform:scale(1)translateY(0);}}
.mr.t{justify-content:flex-start;}
.mr.s{justify-content:flex-end;}

/* TEACHER BUBBLE */
.bub{max-width:86%;padding:7px 10px 5px;border-radius:10px;position:relative;word-break:break-word;}
.bub.t{background:var(--tbub);border-top-left-radius:2px;box-shadow:0 1px 2px rgba(0,0,0,0.09);}
.bub.t::before{content:'';position:absolute;top:0;left:-5px;border:5px solid transparent;border-top-color:var(--tbub);border-left:0;}
.bub.s{background:var(--sbub);border-top-right-radius:2px;box-shadow:0 1px 2px rgba(0,0,0,0.09);}
.bub.s::after{content:'';position:absolute;top:0;right:-5px;border:5px solid transparent;border-top-color:var(--sbub);border-right:0;}
.bub.praise{background:var(--praise);}
.bub.praise::before{border-top-color:var(--praise);}
.bub.wrong2{background:var(--wrong);}
.bub.wrong2::before{border-top-color:var(--wrong);}
.bub.idk2{background:var(--idk);}
.bub.idk2::before{border-top-color:var(--idk);}
.bub.info2{background:#e3f2fd;}
.bub.info2::before{border-top-color:#e3f2fd;}

/* TEACHER TEXT — typewriter style */
.btext{
  font-size:13px;line-height:1.6;color:#111;
  display:inline;
}
.btext strong{color:var(--xgr);}

/* inline audio button */
.abtn{
  display:inline-flex;align-items:center;justify-content:center;
  width:20px;height:20px;border-radius:50%;
  background:var(--gr);border:none;cursor:pointer;
  font-size:10px;color:#fff;
  vertical-align:middle;margin-left:4px;
  flex-shrink:0;transition:background .15s,transform .1s;
  position:relative;top:-1px;
}
.abtn:active{transform:scale(.88);}
.abtn.playing{background:var(--dgr);}
.abtn.playing::after{
  content:'';position:absolute;
  width:28px;height:28px;border-radius:50%;
  border:2px solid var(--dgr);
  animation:ring 1s infinite;
}
@keyframes ring{0%{transform:scale(.7);opacity:.8;}100%{transform:scale(1.5);opacity:0;}}

.btime{font-size:10px;color:#bbb;text-align:right;margin-top:3px;display:flex;justify-content:flex-end;align-items:center;gap:2px;}
.tick{color:#53BDEB;}

/* TYPING INDICATOR */
.typr{display:flex;margin:2px 0;}
.typdots{background:#fff;border-radius:10px;border-top-left-radius:2px;padding:7px 12px;box-shadow:0 1px 2px rgba(0,0,0,0.09);display:flex;gap:4px;align-items:center;}
.typdots span{width:5px;height:5px;border-radius:50%;background:#ccc;animation:td 1.1s infinite;display:block;}
.typdots span:nth-child(2){animation-delay:.18s;}
.typdots span:nth-child(3){animation-delay:.36s;}
@keyframes td{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-4px);}}

/* STUDENT PANEL */
.opanel{
  background:#f0f2f5;
  border-top:0.5px solid #ddd;
  padding:7px 8px;
  display:flex;flex-direction:column;gap:5px;
  flex-shrink:0;
  z-index:10;
  max-height:52vh;
  overflow-y:auto;
}

/* OPTION BUTTONS */
.obtn{
  width:100%;background:#fff;border:1.5px solid #e0e0e0;
  border-radius:10px;padding:8px 11px;
  font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;
  color:#333;cursor:pointer;display:flex;align-items:center;gap:8px;
  text-align:left;transition:all .12s;
  line-height:1.4;
}
.obtn:active{transform:scale(.97);}
.obtn .onum{
  width:24px;height:24px;border-radius:50%;
  background:#607d8b;color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:800;flex-shrink:0;
}
.obtn .otxt{flex:1;}
.obtn .osub{font-size:10px;color:#999;font-weight:400;display:block;margin-top:1px;}
.obtn.ga{background:#e8f5e9;border-color:#a5d6a7;}.obtn.ga .onum{background:#2e7d32;}
.obtn.gb{background:#ffebee;border-color:#ef9a9a;}.obtn.gb .onum{background:#c62828;}
.obtn.gc{background:#fff8e1;border-color:#ffe082;}.obtn.gc .onum{background:#f57f17;}
.obtn.g1 .onum{background:#1565c0;}
.obtn.g2 .onum{background:#6a1b9a;}
.obtn.g3 .onum{background:#bf360c;}
.obtn.g4 .onum{background:#00695c;}
.obtn.disabled{pointer-events:none;opacity:.45;}

/* FIB BOX */
.fibbox{
  background:#fff;border-radius:10px;border:1.5px solid var(--gr);
  padding:9px 11px;display:flex;flex-direction:column;gap:6px;
}
.fibq{font-size:13px;color:#333;font-weight:700;line-height:1.6;}
.fibq span{background:#fff9c4;border-bottom:2px solid #f9a825;padding:0 3px;color:#999;font-style:italic;}
.fibhint{font-size:11px;color:#aaa;text-align:center;}
.fibrow{display:flex;gap:6px;}
.fibinp{
  flex:1;border:1.5px solid #ddd;border-radius:8px;
  padding:8px 10px;font-family:'Nunito',sans-serif;font-size:14px;
  font-weight:700;color:#333;outline:none;
  -webkit-appearance:none;
}
.fibinp:focus{border-color:var(--gr);}
.fibinp.ok{border-color:#43a047;background:#e8f5e9;color:#2e7d32;}
.fibinp.bad{border-color:#e53935;background:#ffebee;color:#b71c1c;}
.fibsub{
  background:var(--gr);color:#fff;border:none;border-radius:8px;
  padding:8px 14px;font-family:'Nunito',sans-serif;font-size:13px;
  font-weight:800;cursor:pointer;flex-shrink:0;
}
.fibsub:active{background:var(--dgr);}

/* CURSOR BLINK */
.cursor{display:inline-block;width:2px;height:1em;background:#111;vertical-align:text-bottom;animation:blink .7s step-end infinite;margin-left:1px;}
@keyframes blink{50%{opacity:0;}}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="hav">👩‍🏫</div>
    <div class="hinfo">
      <div class="hname">Teacher Priya</div>
      <div class="hsub" id="hs">online</div>
    </div>
    <div class="hbadge" id="hb">Day 1</div>
  </div>
  <div class="prog">
    <span class="plbl">🌅 WAKE UP</span>
    <div class="ptrack"><div class="pfill" id="pf" style="width:0%"></div></div>
    <span class="plbl" id="ps">0%</span>
  </div>
  <div class="chat" id="chat">
    <div class="chip"><span>TODAY — Day 1</span></div>
  </div>
  <div class="opanel" id="op"></div>
</div>

<script>
const C=document.getElementById('chat'),OP=document.getElementById('op'),PF=document.getElementById('pf'),PS=document.getElementById('ps'),HB=document.getElementById('hb'),HS=document.getElementById('hs');
const D=ms=>new Promise(r=>setTimeout(r,ms));
function clk(){const d=new Date();return d.getHours()+':'+String(d.getMinutes()).padStart(2,'0');}

// ── SPEECH ──
let currentUtterance=null;
function speak(txt,cb){
  if(!window.speechSynthesis){if(cb)cb();return;}
  window.speechSynthesis.cancel();
  const vv=window.speechSynthesis.getVoices()||[];
  const v=vv.find(x=>(x.name.includes('Samantha')||x.name.includes('Karen')||x.name.includes('Victoria')||x.name.includes('Zira'))&&x.lang.startsWith('en'))
    ||vv.find(x=>x.lang.startsWith('en-'))||vv[0];
  const u=new SpeechSynthesisUtterance(txt);
  if(v)u.voice=v;u.rate=.87;u.pitch=1.1;u.volume=1;
  currentUtterance=u;
  u.onend=u.onerror=()=>{currentUtterance=null;if(cb)cb();};
  window.speechSynthesis.speak(u);
}
function stopSpeak(){
  if(window.speechSynthesis)window.speechSynthesis.cancel();
  currentUtterance=null;
}

// ── TYPEWRITER ──
function typeText(el,text,speed=28){
  return new Promise(res=>{
    let i=0;
    // Strip HTML tags for display, keep bold via innerHTML carefully
    el.innerHTML='';
    const cursor=document.createElement('span');
    cursor.className='cursor';
    el.appendChild(cursor);
    function step(){
      if(i>=text.length){cursor.remove();res();return;}
      // insert char before cursor
      const ch=text[i++];
      cursor.insertAdjacentHTML('beforebegin',ch);
      C.scrollTop=99999;
      setTimeout(step,ch==='.'||ch==='!'||ch==='?'?speed*5:ch===','?speed*2.5:speed);
    }
    step();
  });
}

// ── ADD TEACHER MESSAGE ──
async function addT(plainText,speech,cls='',autoplay=true){
  // Build bubble
  const row=document.createElement('div');row.className='mr t';
  const b=document.createElement('div');b.className='bub t '+(cls||'');
  const wrap=document.createElement('div');wrap.style.cssText='display:flex;align-items:flex-start;gap:4px;flex-wrap:wrap;';
  const tx=document.createElement('span');tx.className='btext';

  // audio button
  const abtn=document.createElement('button');abtn.className='abtn';abtn.innerHTML='🔊';abtn.title='Play again';
  abtn.onclick=()=>{
    if(abtn.classList.contains('playing')){stopSpeak();abtn.classList.remove('playing');abtn.innerHTML='🔊';return;}
    document.querySelectorAll('.abtn.playing').forEach(x=>{x.classList.remove('playing');x.innerHTML='🔊';});
    abtn.classList.add('playing');abtn.innerHTML='⏸';
    speak(speech,()=>{abtn.classList.remove('playing');abtn.innerHTML='🔊';});
  };

  const tm=document.createElement('div');tm.className='btime';tm.textContent=clk();
  wrap.append(tx);
  b.append(wrap,tm);row.appendChild(b);C.appendChild(row);C.scrollTop=99999;

  // Typewriter — plain text only (no HTML inside typewriter)
  await typeText(tx,plainText,27);

  // Append audio button after text
  wrap.appendChild(abtn);
  C.scrollTop=99999;

  if(autoplay){
    abtn.classList.add('playing');abtn.innerHTML='⏸';
    HS.textContent='speaking...';
    await new Promise(r=>speak(speech,()=>{abtn.classList.remove('playing');abtn.innerHTML='🔊';HS.textContent='online';r();}));
  }
}

// ── STUDENT BUBBLE ──
function addS(txt){
  const row=document.createElement('div');row.className='mr s';
  const b=document.createElement('div');b.className='bub s';
  b.textContent=txt;
  const tm=document.createElement('div');tm.className='btime';
  tm.innerHTML=clk()+' <span class="tick">✓✓</span>';
  b.appendChild(tm);row.appendChild(b);C.appendChild(row);C.scrollTop=99999;
}

// ── CHIP ──
function chip(t,lesson=false){
  const d=document.createElement('div');d.className='chip'+(lesson?' lchip':'');
  d.innerHTML='<span>'+t+'</span>';C.appendChild(d);C.scrollTop=99999;
}

// ── TYPING INDICATOR ──
function showT(){
  const r=document.createElement('div');r.className='typr';r.id='typ';
  r.innerHTML='<div class="typdots"><span></span><span></span><span></span></div>';
  C.appendChild(r);C.scrollTop=99999;HS.textContent='typing...';
}
function hideT(){const t=document.getElementById('typ');if(t)t.remove();HS.textContent='online';}

// ── SAY (typing → typewriter → speak) ──
async function say(plainText,speech,cls='',wait=400){
  await D(wait);showT();await D(600);hideT();
  await addT(plainText,speech,cls,true);
}

// ── OPTIONS ──
function opts(arr){
  OP.innerHTML='';
  arr.forEach((o,i)=>{
    const b=document.createElement('button');b.className='obtn '+(o.c||'');
    b.innerHTML=`<div class="onum">${i+1}</div><div class="otxt">${o.t}${o.s?'<span class="osub">'+o.s+'</span>':''}</div>`;
    b.onclick=()=>{document.querySelectorAll('.obtn').forEach(x=>x.classList.add('disabled'));o.fn(b);};
    OP.appendChild(b);
  });
}
function clrOpts(){OP.innerHTML='';}

// ── FILL IN BLANK ──
function fib(qhtml,hint,answers,onOk,onBad){
  OP.innerHTML='';
  const box=document.createElement('div');box.className='fibbox';
  const q=document.createElement('div');q.className='fibq';q.innerHTML=qhtml;
  const h=document.createElement('div');h.className='fibhint';h.textContent=hint;
  const row=document.createElement('div');row.className='fibrow';
  const inp=document.createElement('input');inp.className='fibinp';
  inp.placeholder='ଏଠି ଲେଖ...';inp.autocomplete='off';inp.autocorrect='off';
  inp.autocapitalize='off';inp.spellcheck=false;inp.type='text';
  const sub=document.createElement('button');sub.className='fibsub';sub.textContent='OK ➤';
  row.append(inp,sub);box.append(q,h,row);OP.appendChild(box);
  setTimeout(()=>inp.focus(),300);
  function chk(){
    const v=inp.value.trim().toLowerCase().replace(/\s+/g,' ');
    if(!v)return;
    inp.disabled=true;sub.disabled=true;
    const ok=answers.some(a=>a.toLowerCase()===v||a.toLowerCase()===v.replace(/\s/g,''));
    if(ok){inp.classList.add('ok');addS('✍️ '+inp.value.trim());setTimeout(()=>{clrOpts();onOk();},400);}
    else{inp.classList.add('bad');setTimeout(()=>{clrOpts();onBad(inp.value.trim());},400);}
  }
  sub.onclick=chk;inp.onkeydown=e=>{if(e.key==='Enter')chk();};
}

function upd(n){PF.style.width=(n/4*100)+'%';PS.textContent=Math.round(n/4*100)+'%';HB.textContent='Lesson '+n+'/4';}

// LESSON DATA — all teacher text is plain (no HTML) for typewriter

// EXERCISE RUNNER

async function runEX(exqs,done){
  for(let i=0;i<exqs.length;i++){
    const q=exqs[i];
    await say(q.t,q.s,'',400);
    await D(150);
    await new Promise(res=>{
      opts(q.opts.map((o,idx)=>({
        t:o.t,c:'g'+(idx+1),
        fn:async()=>{
          addS(o.t.replace(/ ✅/g,'').replace(/ ❌/g,''));clrOpts();
          if(o.type==='c')await say(q.okt,q.oks,'praise',350);
          else if(o.type==='w')await say(q.wt,q.ws,'wrong2',350);
          else await say(q.it,q.is,'idk2',350);
          await D(250);
          if(i<exqs.length-1)opts([{t:'Next ▶',c:'ga',fn:()=>{clrOpts();res();}}]);
          else res();
        }
      })));
    });
  }
  await D(200);done();
}
